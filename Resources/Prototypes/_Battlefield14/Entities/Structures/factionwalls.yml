#faction-flagged walls to guide autoturret targeting

# base

- type: entity # cant parent off WallPlastitanium because it's weird and piercing is fucked otherwise
  parent: [ BaseWall , BaseWallTierThree ]
  id: BaseWallPlastitaniumBF14
  name: plastitanium wall
  description: Skub knows this wall is too hard to destroy.
  suffix: BF14
  components:
  - type: Tag
    tags:
    - Wall
  - type: Sprite
    sprite: Structures/Walls/plastitanium.rsi
  - type: Icon
    sprite: Structures/Walls/plastitanium.rsi
  - type: IconSmooth
    key: walls
    base: plastitanium
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 9000
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: RadiationBlocker
    resistance: 5
  - type: StaticPrice
    price: 110 # Mono
  - type: ArmorThickness
    thickness: 8

#plastitanium

- type: entity
