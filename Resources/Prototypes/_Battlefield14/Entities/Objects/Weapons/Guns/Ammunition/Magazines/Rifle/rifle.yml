- type: entity
  parent: BaseMagazineRifle
  id: MagazineRifleSCARH
  name: "SCAR-H magazine (7.62x51mm)"
  description: It's a magazine.
  components:
  - type: Tag
    tags:
      - MagazineRifleSCARH
      - Magazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle762x51
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle762x51
    capacity: 20
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Rifle/SCARH.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: baseplate
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance

