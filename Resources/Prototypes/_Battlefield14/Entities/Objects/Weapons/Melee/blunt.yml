- type: entity
  name: FUBAR
  parent: BaseItem
  id: FUBAR
  description: The BAR that fucks you up beyond all recognition. Cam be used to pry open unpowered airlocks and unanchor things.
  components:
  - type: Sprite
    sprite: _NF/Objects/Tools/maintenance-jack.rsi
    state: icon
  - type: MeleeWeapon
    heavyStaminaCost: 20
    wideAnimationRotation: -45
    swingLeft: true
    attackRate: 0.75
    damage:
      types:
        Blunt: 10
        Structural: 5
    soundHit:
      collection: MetalThud
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: 2
  - type: Wieldable 
#    unwieldOnUse: false
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 25
        Structural: 25
  - type: PhysicalComposition
    materialComposition: 
      Steel: 200
  - type: Item
    size: Large
  - type: Clothing
    sprite: Objects/Weapons/Melee/fireaxe.rsi # Lazy NF guy. heres a tip, just rotate the inhand sprite 90 degrees lol
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: ToolTileCompatible
  - type: Tool
    qualities:
      - Prying
#      - Axing
      - Anchoring
    speedModifier: 1.2
    useSound: /Audio/Items/crowbar.ogg
  - type: Prying
    useSound: /Audio/Items/crowbar.ogg
  - type: UseDelay
    delay: 1
