  name: MP5 magazine (9x19mm)
  description: Gun food.
  components:
  - type: Tag
    tags:
      - MagazinePistolMP5
      - Magazine
      - PistolMagazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgePistol9x19
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgePistol9x19
    capacity: 30
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Pistolcaliber/MP5.rsi
    layers:
