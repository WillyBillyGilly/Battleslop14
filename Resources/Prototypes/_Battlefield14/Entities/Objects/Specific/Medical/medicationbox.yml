- type: entity
  id: MedicationBoxBase
  parent: [BaseStorageItem, RecyclableItemCardboard]
  name: medication box
  description: A small cardboard box holding some blister packets.
  abstract: true
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/medicationbox.rsi
    layers:
    - state: base
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,0,1
#    whitelist:
#      tags:
#      - BlisterPack
  - type: Item
    size: Small
  - type: Tag
    tags:
    - MedicationBox
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
  - type: Appearance

- type: entity
  id: MedicationBoxPillsTricordrazine
  parent: MedicationBoxBase
  name: pill box
  suffix: Tricordrazine
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/medicationbox.rsi
    layers:
    - state: base
    - state: overlay_stripe_lightblue
    - state: overlay_pills_lightblue
  - type: Label
    currentLabel: tricordrazine
  - type: StorageFill
    contents:
    - id: BlisterPackTricordrazine
      amount: 2

