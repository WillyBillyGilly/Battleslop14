# US
- type: entity
  name: M107
  parent: [BaseWeaponRifle, BaseGunWieldable]
  id: WeaponSniperUSM107
  description: A big, beefy, fitty cal anti-materiel rifle.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/M107.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/M107.rsi
  - type: GunRequiresWield
  - type: Item
    shape:
    - 0,0,5,2
  - type: GunWieldBonus # needed so min angle doesn't go negative
    minAngle: 0
    maxAngle: 0
  - type: Gun
    fireRate: 3 # holy shit
    minAngle: 0
    maxAngle: 180
    angleIncrease: 25
    angleDecay: 30
    projectileSpeed: 67 # it's a sniper
    soundGunshot:
      path: /Audio/_Harmony/Weapons/Guns/Gunshots/hristov_fire_alt.ogg
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/M82/rack.ogg
      params:
        volume: -2
    boltClosed: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineSniperM107
        insertSound: /Audio/_Battlefield14/Weapons/Guns/M82/magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/M82/magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineSniperM107
      gun_chamber:
        name: Chamber
        startingItem: Cartridge127mmAP
        priority: 1
        whitelist:
          tags:
            - Cartridge127mmAP
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 10
    pvsIncrease: 0.8
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80
  - type: Appearance
  - type: StaticPrice
    price: 3000
  - type: WieldedCrosshair
    rsi:
      sprite: _Battlefield14/Interface/MousePointer/optics.rsi
      state: acog

- type: entity
  name: Mk-14 EBR
  parent: WeaponRifleUSM14
  id: WeaponSniperUSM14EBR
  description: The M14 was kindof a flop, it tried to be too many things at once. After it was replaced it had a second life as a designated marksman rifle, even recieving this upgraded chassis.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/M14EBR.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: scope
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/M14EBR.rsi
  - type: GunRequiresWield
  - type: GunWieldBonus # needed so min angle doesn't go negative
    minAngle: 0
    maxAngle: 0
  - type: Gun
    fireRate: 4
    minAngle: 0
    maxAngle: 15
    angleIncrease: 4
    angleDecay: 13
    projectileSpeed: 50
    soundGunshot:
      collection: BF_M14_Gunshots
      params:
        volume: -5
        variation: 0.125
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 10
    pvsIncrease: 0.8
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80
  - type: Appearance
  - type: StaticPrice
    price: 3000
  - type: WieldedCrosshair
    rsi:
      sprite: _Battlefield14/Interface/MousePointer/optics.rsi
      state: acog

