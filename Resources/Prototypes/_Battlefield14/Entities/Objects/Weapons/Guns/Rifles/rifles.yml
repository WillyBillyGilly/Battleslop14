# Rifles - RU

- type: entity
  name: AK-74
  parent: BaseWeaponRifle
  id: WeaponRifleRUAK74
  description: The communist response to the success of the M16.
  components:
#  - type: Item # Controls inhand sprites
#    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AK74.rsi
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AK74.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AK74.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -20
  - type: Gun
    minAngle: 21
    maxAngle: 32
    availableModes:
    - SemiAuto
    - FullAuto
    selectedMode: FullAuto
    fireRate: 6
    projectileSpeed: 45
    soundGunshot:
      collection: BF_AK_545_Gunshots
      params:
        volume: -5
        variation: 0.125
  - type: ChamberMagazineAmmoProvider
    boltClosed: null # means the bolt doesnt lock back like M16 pattern rifles, also means you need to cycle the gun after an empty mag
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/AK_GENERIC/rack.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleAK74
        insertSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifleAK74
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeRifle545x39
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeRifle545x39
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ExtendDescription
    descriptionList:
      - description: Takes AK-74 pattern magazines.
        color: "#4f94ad"
        requireDetailRange: true

