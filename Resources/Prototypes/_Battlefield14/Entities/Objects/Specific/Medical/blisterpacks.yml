- type: entity
  name: blister pack
  id: BlisterPack
  parent: [BaseStorageItem, RecyclableItemPlasticTiny]
  description: Holds up to 6 pills.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/blisterpack.rsi
    layers:
    - state: base
    - map: [ "enum.StorageContainerVisualLayers.Fill" ]
      visible: false
  - type: StorageContainerVisuals
    maxFillLevels: 6
    fillBaseName: fill-
  - type: Tag
    tags:
      - PillCanister
      - BlisterPack
  - type: Storage
    grid:
    - 0,0,1,2
    quickInsert: true
    areaInsert: true
    areaInsertRadius: 1
    storageInsertSound: /Audio/Effects/pill_insert.ogg
    storageRemoveSound: /Audio/Effects/pill_remove.ogg
    whitelist:
      tags:
      - Pill
  - type: Appearance
  - type: Dumpable
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/pillbottle_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/pillbottle_drop.ogg

- type: entity
  id: BlisterPackSyrette
  parent: BlisterPack
  description: Holds up to 5 syrettes.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/blisterpack.rsi
    layers:
    - state: base-ampuole
    - map: [ "enum.StorageContainerVisualLayers.Fill" ]
      visible: false
  - type: StorageContainerVisuals
    maxFillLevels: 5
    fillBaseName: fill-ampuole-
  - type: Tag
    tags:
      - BlisterPack
  - type: Storage
    grid:
    - 0,0,4,0
    whitelist:
      tags:
      - Syrette
  - type: Appearance

