# Distinct from the ones in _Battlefield14\Entities\BattlefieldArtillery\Artillery\Factions\Nato\US\Kinetic\Ammunition but similar, chemicalsmoke and plasmagas dont work well with infantry gameplay

- type: entity
  id: Cartridge40x46mmChemicalSmokeInfantry
  name: cartridge (40x46mm CS gas)
  parent: BaseCartridge
  components:
  - type: Item
    size: Small
  - type: Tag
    tags:
    - Cartridge
    - Cartridge40x46mmChemicalSmoke
    - Cartridge40x46mmGrenade
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: Bullet40x46mmChemicalSmokeInfantry
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: blast
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 1.5
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
