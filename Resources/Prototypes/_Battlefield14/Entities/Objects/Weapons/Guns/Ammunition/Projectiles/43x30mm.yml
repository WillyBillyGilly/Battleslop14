- type: entity
  id: Bullet43x30mmHEFrag
  name: 43x30mm HE-Frag grenade
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 80
        Piercing: 50
    deleteOnCollide: true
  - type: HeFragProjectile
    explosionDelay: 0
    fragmentationDelay: 0
    fragmentationCount: 30
    fragmentationPrototype: Bullet43x30mmFragFragment
    plasmaAmount: 0
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HandGrenade
    totalIntensity: 30
    intensitySlope: 3
    maxIntensity: 3
    maxTileBreak: 0
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Projectiles/ballistic.rsi
    layers:
    - state: grenade
  - type: TimedDespawn
    lifetime: 10
  - type: PointLight
    radius: 3
    color: orange
    energy: 0.5

- type: entity
  id: Bullet43x30mmFragFragment
  name: 43x30mm fragment
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 5
        Slash: 8
        Piercing: 8
  - type: StaminaDamageOnCollide
    damage: 5 # ~20 hits to stun
    deleteOnCollide: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: shard
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1
    color: orange
    energy: 0.2

- type: entity
  id: Bullet43x30mmThermobaric
  name: 43x30mm thermobaric grenade
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 80
        Piercing: 50
    deleteOnCollide: true
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 30
    intensitySlope: 6
    maxIntensity: 3
    maxTileBreak: 0
  - type: SpawnOnTrigger
    proto: InstantEffectGravityWellThermobaric
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Projectiles/ballistic.rsi
    layers:
    - state: grenade
  - type: TimedDespawn
    lifetime: 10
  - type: PointLight
    radius: 3
    color: orange
    energy: 0.5

- type: entity
  id: Bullet43x30mmChemicalSmoke
  name: 43x30mm CS gas shell
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 80
        Blunt: 50
    deleteOnCollide: true
  - type: SmokeOnTrigger
    duration: 40
    spreadAmount: 20
    smokePrototype: Smoke
    solution:
      reagents:
      - ReagentId: CSGas
        Quantity: 50
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Projectiles/ballistic.rsi
    layers:
    - state: grenade
  - type: TimedDespawn
    lifetime: 10
  - type: PointLight
    radius: 3
    color: gray
    energy: 0.5

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: Bullet43x30mmHEFragArmingDistance
  name: 43x30mm HE-Frag grenade
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Projectiles/ballistic.rsi
    layers:
    - state: grenade
  - type: Projectile
    damage:
      types:
        Structural: 50
        Blunt: 40
    deleteOnCollide: true
  - type: SubmunitionProjectile
    submunitionPrototype: Bullet43x30mmHEFrag
    distanceDelay: 5
    submunitionDelay: 0
    submunitionCount: 1
    spreadAngle: 0
    velocityMultiplier: 1
  - type: StaminaDamageOnCollide
    damage: 20

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: Bullet43x30mmThermobaricArmingDistance
  name: 43x30mm thermobaric grenade
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Projectiles/ballistic.rsi
    layers:
    - state: grenade
  - type: Projectile
    damage:
      types:
        Structural: 50
        Blunt: 40
    deleteOnCollide: true
  - type: SubmunitionProjectile
    submunitionPrototype: Bullet43x30mmThermobaric
    distanceDelay: 5
    submunitionDelay: 0
    submunitionCount: 1
    spreadAngle: 0
    velocityMultiplier: 1
  - type: StaminaDamageOnCollide
    damage: 20
