# Durathread
- type: entity
  parent: BaseItem
  id: ArmorPlateLight
  name: kevlar insert # BF14
  description: A lightweight protective kevlar insert, made to protect against pistol-class threats. # BF14
  suffix: Light
  components:
  - type: Sprite
    sprite: _Mono/Clothing/ArmorPlate/armor_light.rsi
    state: icon
  - type: Item
    sprite: _Mono/Clothing/ArmorPlate/armor_light.rsi
    size: Normal
  - type: ArmorPlateItem
    maxDurability: 60 # BF14
    walkSpeedModifier: 1 # BF14
    sprintSpeedModifier: 1 # BF14
    staminaDamageMultiplier: 0.2 # BF14
  - type: Damageable
    damageContainer: StructuralInorganic # BF14
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60 #BF14
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior #BF14
        sound:
          path: /Audio/_Battlefield14/Effects/armor_break.ogg
          params:
            volume: 5
            variation: 0.125

