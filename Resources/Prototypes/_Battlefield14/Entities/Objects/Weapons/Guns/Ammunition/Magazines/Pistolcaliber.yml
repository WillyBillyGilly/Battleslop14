- type: entity
  parent: BaseMagazinePistol
  id: MagazinePistolDeagle
  name: deagle magazine (.50 AE)
  description: A .50 Action express magazine, large and bulky just like the gun it self.
  components:
  - type: Tag
    tags:
      - MagazinePistolDeagle
      - Magazine
      - PistolMagazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgePistol50AE
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgePistol50AE
    capacity: 7
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Pistolcaliber/deagle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance

