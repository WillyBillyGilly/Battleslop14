- type: entity
  id: PelletShotgunBF12Gauge
  name: 12 gauge shotgun pellet
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: Projectile
    damage:
      types:
        Piercing: 15
        Structural: 2
    armorPenetration: -0.3
  - type: StaminaDamageOnCollide
    damage: 3 # ~33 hits to stun

