## US

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: BulletRocket84mmHEATArmingDistance
  name: 84mm HEAT rocket
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 100
        Blunt: 50
    deleteOnCollide: true
  - type: SubmunitionProjectile
    submunitionPrototype: BulletRocket84mmHEAT
    distanceDelay: 6
    submunitionDelay: 0
    submunitionCount: 1
    spreadAngle: 0
    velocityMultiplier: 1
  - type: StaminaDamageOnCollide
    damage: 50

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocket84mmHEAT # High explosive anti tank, pierces and does damage on the inside
  name: 84mm HEAT rocket # Used for the AT4 and HEAA SMAW cartridge
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 2000
        Blunt: 250
        Piercing: 250
    deleteOnCollide: false
  - type: ArmorPiercing
    piercingThickness: 7
  - type: Heat
    explosionDelay: 0.1
    fragmentationDelay: 0.1
    fragmentationCount: 40
    fragmentationPrototype: Bullet84mmHEATFragment
  - type: StaminaDamageOnCollide
    damage: 200 # It's a fucking rocket
  - type: Explosive
    explosionType: DemolitionCharge
    totalIntensity: 300
    intensitySlope: 5
    maxIntensity: 50
    maxTileBreak: 2

- type: entity
  categories: [ HideSpawnMenu ]
