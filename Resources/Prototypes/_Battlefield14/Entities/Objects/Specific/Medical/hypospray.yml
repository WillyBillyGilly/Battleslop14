- type: entity
  name: hypospray
  parent: BaseItem
  description: A military model of hypospray (which are intended for high-volume vaccinations) with a larger, portable chemical reserve and compatible with specialised ports in voidsuits.
  id: BF14Hypospray
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/hypo.rsi
    layers:
      - state: hypo1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: hypo_base6 # this currently doesnt work sadly, supposed to work like syringes so the plunger moves back as its filled
        map: ["enum.SolutionContainerLayers.Base"]
  - type: Icon
    sprite: _Battlefield14/Objects/Specific/Medical/hypo.rsi
    state: "hypo_base6"
  - type: Item
    size: Small
    sprite: _Battlefield14/Objects/Specific/Medical/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 60
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.2
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypo

- type: entity
  name: medical hypospray
  parent: BaseItem
  description: A military model of hypospray (which are intended for high-volume vaccinations) with a larger, portable chemical reserve and compatible with specialised ports in voidsuits.
  id: BF14HyposprayBig
  suffix: DO NOT MAP
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/hypobig.rsi
    layers:
      - state: hypo1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: hypo_base6
        map: ["enum.SolutionContainerLayers.Base"]
  - type: Icon
    sprite: _Battlefield14/Objects/Specific/Medical/hypobig.rsi
    state: "hypo_base6"
  - type: Item
    size: Small
    sprite: _Battlefield14/Objects/Specific/Medical/hypobig.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 120
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.2
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: hypo

