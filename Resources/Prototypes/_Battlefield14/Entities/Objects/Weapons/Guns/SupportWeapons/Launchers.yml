# US
- type: entity
  name: Mk 153 SMAW
  parent: [ BaseWeaponLauncher , BaseGunWieldable ]
  id: WeaponLauncherUSSMAW
  description: Shoulder-Launched Multipurpose Assault Weapon, developed for the United States Marine Corps.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/SMAW.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/SMAWworn.rsi
    slots:
    - Back
    - suitStorage
  - type: Gun
    projectileSpeed: 40
    fireRate: 0.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
  - type: BallisticAmmoProvider
    autoCycle: false
    whitelist:
      tags:
        - CartridgeSMAW
    proto: CartridgeSMAWHEAA
    capacity: 1
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: GunRequiresWield
#  - type: AmmoCounter
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: EyeCursorOffset
  - type: CursorOffsetRequiresWield
    maxOffset: 5
    pvsIncrease: 0.25
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80

- type: entity
  name: AT4
  parent: [ BaseWeaponLauncher , BaseGunWieldable ]
  id: WeaponLauncherUSAT4
  description: A single shot 84mm disposable Light Anti-structure Weapon for precisely taking out structures with little collateral damage.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/AT4.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/AT4.rsi
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Huge
  - type: Appearance
  - type: Gun
    projectileSpeed: 40
    fireRate: 0.75
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rpgfire.ogg
  - type: GunRequiresWield
  - type: AmmoCounter
  - type: BasicEntityAmmoProvider
    proto: BulletRocket84mmHEAT
    capacity: 1
  - type: UseDelay
    delay: 1.5
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.80

