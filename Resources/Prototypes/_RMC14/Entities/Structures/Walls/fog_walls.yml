- type: entity
  id: RMCFogWallPermanent
  name: dense fog
  description: It looks way too dangerous to traverse.
  suffix: Permanent
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Effects
    sprite: _RMC14/Effects/fog.rsi
    state: smoke
#BF14  - type: PlacementReplacement
#BF14    key: cm_fog_walls
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: Occluder
#BF14  - type: Fog

- type: entity
  parent: RMCFogWallPermanent
  id: RMCFogWall25
  description: It looks way too dangerous to traverse. Best wait until it has cleared up.
  suffix: 25 minutes
  components:
  - type: TimedDespawn
    lifetime: 1500

- type: entity
  parent: RMCFogWall25
  id: RMCFogWall15
  suffix: 15 minutes
  components:
  - type: TimedDespawn
    lifetime: 900

