  name: security belt
  description: A belt with a holster for holding goodies, baddies, guns, all sorts of things.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Belt/securitybelt.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Belt/securitybelt.rsi
  - type: Storage
    whitelist:
      tags:
        - CigPack
        - Taser
        - SecBeltEquip
        - Radio
        - Magazine
        - CombatKnife
        - Truncheon
        - Grenade
      components:
        - Stunbaton
        - FlashOnTrigger
        - SmokeOnTrigger
        - Flash
        - Handcuff
        - BallisticAmmoProvider
        - CartridgeAmmo
        - DoorRemote
        - Whistle
        - BalloonPopper
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
      storagebase: !type:Container
        ents: []
  - type: ItemSlots
    slots:
      item:
        name: Handgun
        whitelist:
          tags:
          - Sidearm
  - type: ExplosionResistance
    damageCoefficient: 0

