- type: entity
  parent: BaseItem
  id: BaseWeaponLauncherDisposableFolded
  abstract: true
  suffix: folded
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/SMAWD.rsi
    layers:
      - state: icon-storage
  - type: Clothing
    quickEquip: false
    unequipDelay: 1
    sprite: _Battlefield14/Objects/Weapons/Guns/Launchers/SMAWD.rsi
    slots:
    - Back
    - suitStorage
    - SUITSTORAGE2
    clothingVisuals:
      suitstorage2:
      - state: equipped-BACKPACK
  - type: Item
    size: Huge
  - type: SpawnItemsOnUse
    items:
    - id: WeaponLauncherUSSMAWDisposable
    sound:
      path: /Audio/_Goobstation/Items/weapons/Sniper/pickup2.ogg
      params:
        variation: 0.125
  - type: ExtendDescription
    descriptionList:
      - description: Use to unfold.
        color: "#4f94ad"
        requireDetailRange: true

