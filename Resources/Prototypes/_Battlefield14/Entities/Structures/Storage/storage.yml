- type: entity
  parent: BaseStructure
  id: ShelfStore
  name: shelf
  description: A shelf for storing things on.
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/dodgeball.ogg"
  - type: Anchorable
  - type: InteractionOutline
  - type: PlaceableSurface
  - type: Sprite
    sprite: _Civ14/Objects/structures.rsi
    state: storeshelf
    snapCardinals: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 140
        mask:
        - TableMask
        - LowImpassable
        - HighImpassable
        layer:
        - MachineLayer
        - BulletImpassable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Occluder
    boundingBox: -0.4, -0.3, 0.4, 0.4

- type: entity
  parent: BaseStructure
  id: BFShelfWood
  name: shelf
  description: A shelf for storing things on.
  components:
  - type: MeleeSound
