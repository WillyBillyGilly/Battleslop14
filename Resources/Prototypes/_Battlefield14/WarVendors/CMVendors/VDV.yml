- type: entity
  parent: ColMarTechBase
  id: CMVendPACTVDVWarVendor
  name: VDV war vendor
  description: Please sir, may I have a little more?
  suffix: ColMarTech
  components:
  - type: Sprite
    sprite: _Battlefield14/Structures/armoury.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
#      shader: unshaded
#    - state: panel
#      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: CMAutomatedVendor
    sections:
    - name: Armour
      choices: { BF14Armour: 1 }
      entries:
      - id: EVAKitCombatRU
        name: voidsuit
        recommended: true
#      - id: ClothingOuterArmorPlateCarrierBlack
#        name: plate carrier
    - name: Backpack/belt
      choices: { BF14Storage: 2 }
      entries:
      - id: ClothingBackpackRucksackTan
        replaceSlot: back
        name: tan rucksack
      - id: ClothingBackpackRucksackBlack
        replaceSlot: back
        name: black rucksack
        recommended: true
      - id: ClothingBeltMilitaryWebbingRU
        replaceSlot: belt
        name: belt rig
      - id: ClothingBeltAssault
        replaceSlot: belt
        name: assault belt
      - id: ClothingBeltMedicalEMTFilledBF14Basic
        replaceSlot: belt
        name: basic medical belt
        amount: 4
    - name: Weapons
      entries:
      - id: WeaponRifleRUAK12
        amount: 50
      - id: WeaponRifleRUAKS74U
        amount: 5
      - id: WeaponSubmachinegunRUVityaz
        amount: 5
      - id: WeaponPistolMP443
        amount: 2
    - name: Utility
      entries:
      - id: RiotBulletShield
        amount: 3
      - id: CombatKnife
        amount: 10
      - id: JetpackBlackFilled
        amount: 10
      - id: HandHeldMassScanner
        amount: 50
      - id: Crowbar
        amount: 50
    - name: Sustainment
      entries:
      - id: BoxMRE
        amount: 50
      - id: FoodSnackNutribrick
        amount: 50
      - id: DrinkMREFlask
        amount: 50
      - id: OxygenTankFilled
        amount: 50
    - name: Misc
      entries:
      - id: RusfedFlagFolded
        amount: 3
      - id: WeaponSniperRUSVDSObrez
        amount: 1
      - id: MagazineSniperSVDS
        amount: 3

