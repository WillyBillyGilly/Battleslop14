# Base
- type: entity
  parent: MobHuman
  id: MobHumanMarsocBaseBF14
  name: john marsoc
  suffix: Human, Base, Marsoc, BF14
  components:
  - type: HumanoidAppearance
    height: 1.0
    width: 1.0
  - type: Loadout
    prototypes: [MARSOCRiflemanGear]
  - type: GhostRole
    name: job-name-marsoc-rifleman
    description: job-description-marsoc-rifleman
    rules: ghost-role-information-marsoc-rules-bf14
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameSegments: [names_death_commando]
  - type: NpcFactionMember
    factions:
    - USMC
  - type: Company
    companyName: USMC
  - type: SurgerySpeedModifier
    speedModifier: 1.5
  - type: LanguageKnowledge # Einstein Engines
    speaks:
    - English
    - Esperanto
    - Sign
    understands:
    - English
    - Esperanto
    - Sign
    - TauCetiBasic

