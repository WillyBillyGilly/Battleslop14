# US

- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHatHelmetUS
  name: american camo helmet
  description: This isnt for catching shrap or rounds, its made to keep your grey matter from grossing out your buddies.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Head/Helmets/ushelmet.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Head/Helmets/ushelmet.rsi
  - type: Armor
    modifiers:
#      coefficients:
#        Blunt: 0.9
#        Slash: 0.9
#        Piercing: 0.9
#        Heat: 0.9
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
  - type: ExplosionResistance
    damageCoefficient: 0.9

