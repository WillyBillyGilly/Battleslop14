- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: Bullet25x40HE
  name: 25x40mm explosive projectile
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: smallfrag
  - type: Projectile
    damage:
      types:
        Structural: 150
        Blunt: 150
  - type: HeFragProjectile
    fillPrototype: Bullet25x40Fragment
    capacity: 16
    randomAngle: true
    minVelocity: 8
    maxVelocity: 15
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 50
    intensitySlope: 3
    maxIntensity: 20
    maxTileBreak: 0
  - type: StaminaDamageOnCollide
    damage: 25 # ~4 hits to stun

- type: entity
  id: Bullet25x40AirburstFlak
  name: 25x40mm airburst flak projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 60
    deleteOnCollide: true
  - type: SubmunitionProjectile
    submunitionPrototype: Bullet25x40FlakFragment
    distanceDelay: 0
    submunitionDelay: 1.0
    submunitionCount: 15
    spreadAngle: 10
    velocityMultiplier: 3.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: smallfrag
  - type: ShipWeaponProjectile
#  - type: TimedDespawn
#    lifetime: 100
  - type: PointLight
    radius: 4
    color: orange
    energy: 0.6
  - type: RadarBlip
    scale: 3.5
    requireNoGrid: true
    shape: triangle
    radarColor: "#FF7700"

