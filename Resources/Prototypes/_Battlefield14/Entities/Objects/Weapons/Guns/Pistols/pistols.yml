- type: entity
  name: Glock-17
  parent: BaseWeaponPistol
  id: WeaponPistolATGlock17
  description: The Glock-17 pistol, the media called it a "ghost gun" due to its high use of polymers, which led to people thinking you could get it through metal detectors without getting discovered.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Pistols/glock17.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    minAngle: 0
    maxAngle: 15
    angleIncrease: 2
    angleDecay: 10
    fireRate: 5
    projectileSpeed: 30
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: BF_Glock17_Gunshots
      params:
        volume: -3
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/Glock17/rack.ogg
      params:
        volume: -1
    soundBoltOpened:
      path: /Audio/_Battlefield14/Weapons/Guns/Glock17/lock.ogg
      params:
        volume: -1
    soundBoltClosed:
      path: /Audio/_Battlefield14/Weapons/Guns/Glock17/chamber.ogg
      params:
        volume: -1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolGlock17
        insertSound: /Audio/_Battlefield14/Weapons/Guns/Glock17/magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/Glock17/magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolGlock17
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgePistol9x19
        priority: 1
        whitelist:
          tags:
            - BF_CartridgePistol9x19
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ExtendDescription
    descriptionList:
      - description: Takes Glock-17 pattern magazines.
        color: "#4f94ad"
        requireDetailRange: true

