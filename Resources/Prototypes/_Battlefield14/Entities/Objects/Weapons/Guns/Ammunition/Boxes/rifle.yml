# Boxes

- type: entity
  parent: BaseItem
  id: MagazineBoxBigBF14
  name: bulk ammunition box (5.56x45mm)
  abstract: true
  components:
  - type: Tag
    tags:
      - AmmunitionBox
  - type: BallisticAmmoProvider
    capacity: 200
    proto: BF_CartridgeRifle556x45
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/5.56x45mm.rsi
    layers:
    - state: base-b
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: magb
    steps: 4
    zeroVisible: false
  - type: Item
    size: Large
  - type: Appearance

