- type: entity
  id: WhiteFlagPole
  name: white flag
  description: A flag pole, bearing a white flag.
  parent: BaseStructure
  components:
  - type: Sprite
    sprite: _Battlefield14/Structures/Flags/flagpoles.rsi
    layers:
      - state: whiteflag
        offset: 0.25, 1
    drawdepth: OverMobs
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.17,0.17,-0.17,-0.17"
#        density: 190
#        mask:
#        - MachineMask
#        layer:
#        - LowImpassable
  - type: InteractionOutline
  - type: SpriteFade

