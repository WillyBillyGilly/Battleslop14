## NATO
# US

- type: entity
  name: deagle
  parent: BaseWeaponPistol
  id: WeaponPistolILDeagle
  description: The deagle, a well known and very impractical handgun. Chambered in the large .50 Action express it packs a punch.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Pistols/deagle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    minAngle: 0
    maxAngle: 15
    angleIncrease: 2
    angleDecay: 10
    fireRate: 3
    projectileSpeed: 30
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: BF_Deagle_Gunshots
      params:
        volume: -3
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/rack.ogg
      params:
        volume: -1
    soundBoltOpened:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/slidepull.ogg
      params:
        volume: -1
    soundBoltClosed:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/sliderel.ogg
      params:
        volume: -1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolDeagle
        insertSound: /Audio/_Battlefield14/Weapons/Guns/Beretta/magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/Beretta/magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolDeagle
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgePistol50AE
        priority: 1
        whitelist:
          tags:
            - BF_CartridgePistol50AE
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

