- type: entity
  id: MortarNATOUS81mmM252
  parent: BaseStructure # no moving once placed, disassemble with wrench
  name: M252 81mm mortar
  suffix: 81mm
  description: An 81mm battalion mortar. It offers a fairly moderate rate of fire, tolerable accuracy, and fires a wide variety of relatively inexpensive ammunition. Dont shoot straight up.
  components:
  - type: Sprite
    sprite: _VXS14/Structures/mortar.rsi
    state: mortar
  - type: Mortar
    baseAccuracy: 0.5
    accuracyDegradation: 0.2
    minOffsetX: -40
    maxOffsetX: 40
    minOffsetY: -40
    maxOffsetY: 40
    minSafeDistance: 0
  - type: ContainerContainer
    containers:
      mortar_chamber: !type:ContainerSlot
  - type: ItemSlots
    slots:
      mortar_chamber:
        name: Chamber
        priority: 1
        insertSound: /Audio/_VXS14/Weapons/Guns/Artillery/mortarload.ogg
        whitelist:
          tags:
            - ShellMortar81M252
  - type: Construction
    graph: MortarNATOUS81mmM252
    node: MortarM252Deployed
    deconstructionTarget: start
  - type: ExtendDescription
    descriptionList:
      - description: Maximum range 40 meters.
        color: "#4f94ad"
        requireDetailRange: true

- type: entity
  parent: BaseItem
  id: MortarNATOUS81mmM252Assembly
  name: M252 81mm mortar assembly
  description: A folded up mortar, assemble with a wrench.
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: Objects/Devices/flatpack.rsi
    layers:
    - state: base
    - state: overlay
      color: "#cec8ac"
      map: ["enum.FlatpackVisualLayers.Overlay"]
    - state: icon-default
  - type: Appearance
    price: 250
  - type: Rotatable
  - type: Construction
    graph: MortarNATOUS81mmM252
    node: MortarM252Assembly
    deconstructionTarget: start

