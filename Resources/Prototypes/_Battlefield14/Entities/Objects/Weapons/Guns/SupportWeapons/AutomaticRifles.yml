## NATO
# US
- type: entity
  name: M27-IAR
  parent: WeaponRifleUSM16A4
  id: WeaponRifleUSM27IAR
  description: The Marine corps own 416, intended to replace the M16A4 and the M249.
  components:
  - type: Item # Controls inhand sprites
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/M27-IAR.rsi
  - type: Icon
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/iconstates.rsi
    state: icon-full-M27IAR
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/iconstates.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: longcog
      - state: stock-adjustable-HK
      - state: rifle-length-barrel-quadrail
      - state: foregrip
      - state: railcover
      - state: mag-30-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/M27-IAR.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleSTANAGTracerRed
        insertSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magout.ogg
        swap: false
        priority: 2
        whitelist:
          tags:
            - MagazineRifleSTANAG
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeRifle556x45TracerRed
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeRifle556x45
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -35
  - type: Gun
    minAngle: 19 # wielded = 0
    maxAngle: 50 # wielded = 15
    angleIncrease: 0.7
    angleDecay: 16
    availableModes:
    - SemiAuto
    - FullAuto
    selectedMode: FullAuto
    fireRate: 7
    projectileSpeed: 50 # twenty inch barrel
    soundGunshot:
      collection: BF_M16_Gunshots
      params:
        volume: -5
        variation: 0.125
  - type: Appearance
  - type: ClothingSpeedModifier # this thing is heavier than the M16, plus otherwise it would be objectively better than the M16
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 5
    pvsIncrease: 0.35

# DE

- type: entity
  name: MG36
  parent: WeaponRifleDEG36K
  id: WeaponRifleDEMG36
  description: A G36 with a heavier barrel, a double drum magazine (usually), and less of a tendancy to melt under sustained fire.
  components:
  - type: Item # Controls inhand sprites
    sprite: _Battlefield14/Objects/Weapons/Guns/MachineGuns/MG36onmob.rsi
    size: Large
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/MachineGuns/MG36.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/MachineGuns/MG36onmob.rsi
  - type: GunWieldBonus
    minAngle: -17
    maxAngle: -24
  - type: Gun
    minAngle: 20 # wielded = 3
    maxAngle: 40 # wielded = 24
    angleIncrease: 1.5
    projectileSpeed: 50
    fireRate: 8
    soundGunshot:
      collection: BF_SCARL_Gunshots
      params:
        volume: -5
        variation: 0.125
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 5
    pvsIncrease: 0.35
  - type: WieldedCrosshair
    rsi:
      sprite: _Battlefield14/Interface/MousePointer/optics31.rsi
      state: hensoldt
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier

## PACT
# RU

- type: entity
  name: RPK-2016
  parent: BaseWeaponRifle
  id: WeaponRifleRURPK2016
  description: A modernised RPK-74, with simply "cooler" furniture and more modern manufacture, but does not exactly translate to performance. 2016 refers to the date of development.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/RPK2016.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: collimator
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/RPK2016.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -35
  - type: Gun
    minAngle: 19
    maxAngle: 50
    angleIncrease: 1
    angleDecay: 16
    availableModes:
    - SemiAuto
    - FullAuto
    selectedMode: FullAuto
    fireRate: 7
    projectileSpeed: 50 # twenty inch barrel
    soundGunshot:
      collection: BF_AK_545_Gunshots
      params:
        volume: -5
        variation: 0.125
  - type: ChamberMagazineAmmoProvider
    boltClosed: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleAK74blackdrumTracerGreen
        insertSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magin_drum.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magout_drum.ogg
        swap: false
        priority: 2
        whitelist:
          tags:
            - MagazineRifleAK74
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeRifle545x39TracerGreen
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeRifle545x39
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: SpeedModifiedOnWield
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: ExtendDescription
    descriptionList:
      - description: Takes AK-74 pattern magazines.
        color: "#4f94ad"
        requireDetailRange: true
