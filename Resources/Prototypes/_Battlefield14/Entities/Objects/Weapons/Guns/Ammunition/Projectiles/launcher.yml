- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocket83mmNE
  name: 83mm Novel Explosive projectile # anti infantry, explodes on contact and sends fragments everywhere with a wide explosive for killing infantry
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 150
        Blunt: 250
  - type: HeFragProjectile
    fillPrototype: Bullet84mmHEATFragment
    capacity: 40
    randomAngle: true
    minVelocity: 8
    maxVelocity: 15
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 300
    intensitySlope: 5
    maxIntensity: 25
    maxTileBreak: 0
  - type: StaminaDamageOnCollide
    damage: 200 # It's a fucking rocket

- type: entity
  id: Bullet84mmHEATFragment
  name: 84mm HEAT fragment
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Slash: 15
        Piercing: 15
  - type: StaminaDamageOnCollide
    damage: 15 # ~7 hits to stun
    deleteOnCollide: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: shard
  - type: ShipWeaponProjectile
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    radius: 0.8
    color: orange
    energy: 0.15
  - type: RadarBlip
    scale: 0.4
    requireNoGrid: true
    shape: triangle
    radarColor: "#FF9900"

