- type: entity
  parent: [ ClothingHeadHelmetBasic , ClothingHeadLightBase ]
  id: ClothingHeadHatHelmetThinker
  name: thinker helmet
  description: Ah, the shit pythagoras cares about, truly profound.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Head/Helmets/thinker.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Head/Helmets/thinker.rsi
    clothingVisuals:
      head:
      - state: off-equipped-HELMET
        offset: "0, 0.12"
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.8
        Piercing: 0.9
        Heat: 0.9
        Shock: 5
  - type: PointLight
    enabled: false
    radius: 3
    energy: 1
    color: "#FFC458"
    mask: null
    autoRot: true
    netsync: false

- type: entity
  parent: ClothingHeadHatHelmetUS
  id: ClothingHeadHatHelmetPilotBlack
  name: pilot helmet
  description: Has enough protection to stop your head getting caved in after ejection and is equipped with an advanced IFF sensor suite and welding arc protection.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Head/Helmets/helmetpilotblack.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Head/Helmets/helmetpilotblack.rsi
  - type: ShowJobIcons
  - type: Tag
    tags:
    - HudSecurity
  - type: EyeProtection # welding protection, not flash protection
  - type: IdentityBlocker
    coverage: EYES
  - type: ExtendDescription
    descriptionList:
      - description: Provides welding protection and sechud.
        fontSize: 12
        color: "#4f94ad"
        requireDetailRange: false

