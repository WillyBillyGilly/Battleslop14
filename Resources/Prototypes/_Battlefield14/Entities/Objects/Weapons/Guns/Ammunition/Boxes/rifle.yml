# Boxes
- type: entity
  # COMMENTED OUT: Missing parent 'BaseMagazineBoxLightRifle'
  # parent: BaseMagazineBoxLightRifle
  parent: BaseItem
  id: MagazineBox556x45Big
  name: bulk ammunition box (5.56x45mm)
  components:
  - type: BallisticAmmoProvider
    capacity: 200
    proto: BF_CartridgeRifle556x45
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Item
    size: Large
  - type: Appearance

