- type: entity
  name: RGO Offensive Impact grenade
  description: What does this even stand for? Russian Grenade something? oh well, pull the pin, chuck it, and it blows up.
  parent: BaseItem
  id: RGOImpactHandgrenade
  components:
  - type: Item
    size: Small
  - type: Tag
    tags:
      - Grenade
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Grenades/rgo.rsi
    layers:
    - state: icon
    - state: primed
      visible: false
      map: ["enum.ToggleVisuals.Layer"]
  - type: Appearance
  - type: AnimationPlayer
  - type: GenericVisualizer
    visuals:
      enum.ToggleVisuals.Toggled:
        enum.ToggleVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: ItemToggle
    predictable: false
    soundActivate:
      path: /Audio/_Battlefield14/Weapons/Grenades/trigger2.ogg
    soundDeactivate:
      path: /Audio/_Battlefield14/Weapons/Grenades/disable1.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Grenade
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: ComponentToggler
    components:
    - type: DamageOnLand
      damage:
        types:
          Blunt: 60
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HandGrenade
    maxIntensity: 10
    intensitySlope: 2
    totalIntensity: 30
    canCreateVacuum: false
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: ProjectileGrenade
    fillPrototype: BulletGrenadeF1Fragment
    capacity: 30
  - type: EmitSoundOnPickup
    sound: /Audio/_Battlefield14/Weapons/Grenades/grab1.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_Battlefield14/Weapons/Grenades/drop1.ogg
  - type: EmitSoundOnLand
    sound:
      collection: FragGrenadeSFX
  - type: ExtendDescription
    descriptionList:
      - description: Activate to pull the pin, arming the contact fuze, activate again to disarm, produces shrapnel. Will bounce off walls. Useless without gravity.
        color: "#4f94ad"
        requireDetailRange: true

