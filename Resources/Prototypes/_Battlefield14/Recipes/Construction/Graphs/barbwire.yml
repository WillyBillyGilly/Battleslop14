- type: constructionGraph
  id: BarbwireFloor
  start: start
  graph:
    - node: start
      edges:
        - to: barbwirefloor
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: BarbedWire
              amount: 1
              doAfter: 3

    - node: barbwirefloor
      entity: BarbwireFloor
      edges:
        - to: start
          completed:
            - !type:AdminLog # Needs a log for start of attempt in addition to the completion log
              message: "A barbed wire roll was cut"
            - !type:SpawnPrototype
              prototype: BarbedWire1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Cutting
              doAfter: 3.5
