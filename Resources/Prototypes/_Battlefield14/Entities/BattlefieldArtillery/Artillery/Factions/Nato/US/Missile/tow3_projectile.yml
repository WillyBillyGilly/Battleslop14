# TOW3 Missile Projectile (NATO Main HEAT - Precision Shaped Charge)
- type: entity
  id: BulletTOW3
  name: TOW3 missile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 450
        Piercing: 400
        Heat: 50
    deleteOnCollide: false
  - type: ArmorPiercing
    piercingThickness: 120
  - type: Heat
    explosionDelay: 0
    fragmentationDelay: 0
    fragmentationCount: 3
    fragmentationPrototype: BulletTOW3Fragment
    plasmaAmount: 0
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 180
    intensitySlope: 6
    maxIntensity: 25
    maxTileBreak: 2
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectSmall
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#FCBA03"
    scale: 2
    requireNoGrid: true
    shape: hexagon
  - type: TimedDespawn
    lifetime: 8
  - type: PointLight
    radius: 4
    color: orange
    energy: 0.6
  - type: PassiveThermalSignature
    signature: 500000
  - type: ThermalSignature
  - type: GatheringProjectile
  - type: MiningGatheringSoft
  - type: MiningGatheringHard
  - type: TargetGuided
    turnRate: 120
    acceleration: 250
    maxSpeed: 250
    launchSpeed: 80
    maxLifetime: 30

# TOW3 Fragment
- type: entity
  id: BulletTOW3Fragment
  name: TOW3 fragment
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 30
        Piercing: 25
    deleteOnCollide: true
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/50_armorpiercing_machinegun_casing.rsi
    layers:
    - state: base-projectile
    scale: 0.5, 0.5
  - type: ShipWeaponProjectile
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    color: orange
    energy: 0.3
  - type: RadarBlip
    scale: 0.6
    requireNoGrid: true
    shape: triangle
    radarColor: "#FF9900"

