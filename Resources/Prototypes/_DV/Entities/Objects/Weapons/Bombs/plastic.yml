- type: entity
  name: breaching charge
  description: A precision shaped charge for blowing holes through walls without too much extra hole #A breaching explosive for security officers to break through walls.
  parent: SeismicCharge
  id: BreachingCharge
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Bombs/breaching.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
  - type: OnUseTimerTrigger
    delay: 5 # BF14 10 > 5
    delayOptions: [5, 10, 15, 20] # BF14 reduced delay by 5 seconds
    initialBeepDelay: 0
    beepSound:
      path: /Audio/Effects/Cargo/buzz_two.ogg
      params:
        volume: -6
    startOnStick: true
    canToggleStartOnStick: true
  - type: Explosive
    explosionType: DemolitionCharge
    totalIntensity: #BF14 (200) # mono (400)
    intensitySlope: 800 # BF14 50 > 200 | 1x1 explosion (still hits what's directly next to it because of their bounding box or something
    maxIntensity: 150 # mono
    canCreateVacuum: false # mono
