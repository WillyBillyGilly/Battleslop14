- type: entity
  id: WindowDirectionalBank
  parent: WindowReinforcedDirectional
  name: bank window
  description: Don't smudge up the glass down there.
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    sprite: _Civ14/Objects/structures.rsi
    state: bank_glass
  - type: Icon
    sprite: _Civ14/Objects/structures.rsi
    state: bank_glass
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.2,0.5,0.2"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 275
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassReinforced:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 3
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks.rsi
  - type: ArmorThickness # BF14
    thickness: 5

- type: entity
  id: WindowDirectionalBankOpen
  parent: WindowDirectionalBank
  name: bank window
  description: Don't smudge up the glass down there.
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    sprite: _Civ14/Objects/structures.rsi
    state: bank_glass_open
  - type: Icon
    sprite: _Civ14/Objects/structures.rsi
    state: bank_glass_open
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.2,0.5,0.2"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - MachineLayer
  - type: BarricadeBlock # BF14
    bidirectional: false
    omnidirectional: true
    blocking: 80
  - type: ExtendDescription # BF14
    descriptionList:
      - description: This object can be used as cover.
        fontSize: 12
        color: "#4f94ad"
        requireDetailRange: true
