    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
  - type: Battery
    maxCharge: 500
  - type: ProjectileBatteryAmmoProvider
    proto: FighterMissileMaverick
    fireCost: 500
  - type: Appearance
  - type: AmmoCounter

- type: entity
  id: FighterMissileMaverick
  name: AGM-67 Maverick
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 350
        Blunt: 100
        Heat: 40
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/hybrid_missile.rsi
    layers:
