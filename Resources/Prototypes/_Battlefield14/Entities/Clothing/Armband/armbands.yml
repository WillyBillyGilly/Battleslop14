- type: entity
  parent: ClothingArmbandBase
  id: ClothingArmbandMassScanner
  name: wrist-mounted mass scanner
  description: A portable radar mounted on the wrist for easy access at any time.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: _Battlefield14/Clothing/Accessories/wristscanner.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Accessories/wristscanner.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT
  - type: RadarConsole
    maxRange: 512
    followEntity: true
  - type: DetectionRangeMultiplier
    infraredMultiplier: 0.5 # from 1
    visualMultiplier: 3 # from 4
  - type: ActivatableUI
    key: enum.RadarConsoleUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
