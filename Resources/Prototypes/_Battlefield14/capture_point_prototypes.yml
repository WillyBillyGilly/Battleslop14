# Base capture point
- type: entity
  id: BaseCapturePoint
  name: capture point
  description: A strategic location that can be captured and controlled by factions.
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: generic
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: Appearance
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - TableLayer
  - type: PointLight
    enabled: true
    radius: 1.5
    energy: 2.5
    color: "#43a20d"
    netsync: false
  - type: NavMapBeacon
    defaultText: objective-beacon-general
    color: "#FFFF00"
  - type: POICapture
    poiName: "Control Point Alpha"
    timeToCapture: 60 # 1 minute to capture
    gracePeriod: 600 # 10 minutes until open
    doAfterDelay: 3
    controllingFaction: null
    isBeingCaptured: false
    capturingFaction: null
    currentCaptureProgress: 0

# Specific Control points for map locations
- type: entity
  id: CapturePointEngineering
  parent: BaseCapturePoint
  name: engineering control point
  suffix: 120s / 2m
  components:
  - type: POICapture
    poiName: "Engineering Sector"
