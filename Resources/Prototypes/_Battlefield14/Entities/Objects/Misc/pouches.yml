- type: entity
  id: BasePouch
  parent: BaseStorageItem
  abstract: true
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Misc/pouches.rsi
    layers:
      - state: utility
  - type: Item
    size: Small
    shape:
    - 0,0,3,3
  - type: Storage
    maxItemSize: Small
    defaultStorageOrientation: Vertical
    grid:
    - 0,0,3,1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
  - type: StaticPrice
    price: 100

- type: entity
  id: PouchFirstAid
  parent: BasePouch
  name: first aid pouch
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Misc/pouches.rsi
    layers:
      - state: firstaid
  - type: Storage
    whitelist:
      tags:
        - Brutepack
        - Gauze
        - Ointment
        - PillCanister
        - BlisterPack
        - Tourniquet
      components:
        - Hypospray
        - Injector
        - Pill
  - type: ExplosionResistance
    damageCoefficient: 0.0

- type: entity
  id: PouchMedkit
  parent: PouchFirstAid
  name: medkit pouch
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Misc/pouches.rsi
    layers:
      - state: medkit
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,2
    whitelist:
      tags:
        - DiscreteHealthAnalyzer
        - Brutepack
        - Gauze
        - Ointment
        - PillCanister
        - Tourniquet
      components:
        - Hypospray
        - Injector
        - Pill


- type: entity
  id: PouchMags
  parent: BasePouch
  name: magazine pouch
  description: A small pouch for holding magazines.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Misc/pouches.rsi
    layers:
      - state: medium_ammo_mag
  - type: Item
    size: Small
    shape:
    - 0,0,3,3
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,1
    whitelist:
      tags:
      - Magazine
    storageOpenSound:
      collection: BF_Magpouch_Open
      params:
        volume: -1
        variation: 0.125
    storageCloseSound:
      collection: BF_Magpouch_Open
      params:
        volume: -1
        variation: 0.125
    storageInsertSound:
      collection: BF_Magpouch_Insert
      params:
        volume: -1
        variation: 0.125
    storageRemoveSound:
      collection: BF_Magpouch_Remove
      params:
        volume: -1
        variation: 0.125
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
  - type: StaticPrice
    price: 100

- type: entity
  id: PouchMagsLarge
  parent: PouchMags
  name: large magazine pouch
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Misc/pouches.rsi
    layers:
