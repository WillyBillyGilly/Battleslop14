- type: entity
  parent: BaseItem
  id: MagazineBeltBoxM249
  name: "M249 belt box (5.56x45)"
  description: A big box that has a belt in it, for 5.56x45 millimeter ammo.
  components:
  - type: Tag
    tags:
      - MagazineBeltBoxM249
  - type: Item
    size: Normal
    shape:
      - 0,0,2,1 # 3 wide, basically 3 magazines wide 
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle556x45
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle556x45
    capacity: 200
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/BeltBoxes/M249.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance

