- type: entity
  parent: BaseFlag
  id: USMCFlag
  name: united states marine corps flag
  description: OOOH FUCKING RAH MOTHERFUCKER.
  components:
  - type: Sprite
    sprite: _Battlefield14/Structures/Flags/wallmount.rsi
    state: usmcflag
  - type: DisassembleOnAltVerb
    prototype: USMCFlagFolded
    doAfter: 3

- type: entity
  id: USMCFlagFolded
  parent: BaseItem
  name: united states marine corps flag
  description: OOOH FUCKING RAH MOTHERFUCKER.
  components:
  - type: Sprite
    sprite: Clothing/Multiple/towel.rsi
    layers:
    - state: icon
      color: "#a64453"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#a64453"
      right:
      - state: inhand-right
        color: "#a64453"
    size: Small
  - type: SpawnAfterInteract
    prototype: USMCFlag
    doAfter: 3
    removeOnInteract: true

