- type: entity
  name: blister pack
  id: BlisterPack
  parent: [BaseStorageItem, RecyclableItemPlasticTiny]
  description: Holds up to 6 pills.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/blisterpack.rsi
    layers:
    - state: base
    - state: fill-1
      map: ["fill-1"]
      visible: false
    - state: fill-2
      map: ["fill-2"]
      visible: false
    - state: fill-3
      map: ["fill-3"]
      visible: false
    - state: fill-4
      map: ["fill-4"]
      visible: false
    - state: fill-5
      map: ["fill-5"]
      visible: false
    - state: fill-6
      map: ["fill-6"]
      visible: false
  - type: Tag
    tags:
      - PillCanister
      - BlisterPack
  - type: Storage
    grid:
    - 0,0,1,2
    quickInsert: true
    areaInsert: true
    areaInsertRadius: 1
    storageInsertSound: /Audio/Effects/pill_insert.ogg
    storageRemoveSound: /Audio/Effects/pill_remove.ogg
    whitelist:
      tags:
      - Pill
    hideStackVisualsWhenClosed: false
  - type: ItemCounter
    count:
      tags: [Pill]
    composite: true
    layerStates:
    - fill-1
    - fill-2
    - fill-3
    - fill-4
    - fill-5
    - fill-6
  - type: Appearance
  - type: Dumpable
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/pillbottle_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/pillbottle_drop.ogg

- type: entity
  id: BlisterPackSyrette
  parent: BlisterPack
  description: Holds up to 5 syrettes.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/blisterpack.rsi
    layers:
    - state: base-ampuole
    - state: fill-ampuole-1
      map: ["fill-ampuole-1"]
      visible: false
    - state: fill-ampuole-2
      map: ["fill-ampuole-2"]
      visible: false
    - state: fill-ampuole-3
      map: ["fill-ampuole-3"]
      visible: false
    - state: fill-ampuole-4
      map: ["fill-ampuole-4"]
      visible: false
    - state: fill-ampuole-5
      map: ["fill-ampuole-5"]
      visible: false
  - type: Tag
    tags:
      - BlisterPack
  - type: Storage
    grid:
    - 0,0,4,0
    whitelist:
      tags:
      - Syrette
    hideStackVisualsWhenClosed: false
  - type: ItemCounter
    count:
      tags: [Syrette]
    composite: true
    layerStates:
    - fill-ampuole-1
    - fill-ampuole-2
    - fill-ampuole-3
    - fill-ampuole-4
    - fill-ampuole-5
  - type: Appearance

