  - type: entity
    id: BaseFighterBF
    abstract: true
    components:
    - type: Mech
      maxEquipmentAmount: 3
    - type: Physics
      bodyType: Dynamic
    - type: PassiveThermalSignature
      signature: 250000 # ~1km
    - type: ThermalSignature
      storedHeat: 2
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.9
          density: 21390
          #mask:
          #- FighterImpassable
          # COMMENTED OUT: Invalid enum value 'FighterMask' - not found in physics layer enum
          # layer:
          # - FighterMask
    - type: TargetSeekingTarget # needed for A2A missiles
    - type: TargetSeekerAlert
      targetGainSound:
        path: /Audio/_Mono/Effects/Alerts/rwr_beep.ogg
      distanceAlertSettings:
      - maximumDistance: 220
        sound:
          path: /Audio/_Mono/Effects/Alerts/launchwarning.ogg
          params:
            loop: true
            volume: 0.9
            pitch: 1.05
      - maximumDistance: 400
        sound:
          path: /Audio/_Mono/Effects/Alerts/master_caution.ogg
          params:
            loop: true
            volume: 1.3
            pitch: 1.15
      - maximumDistance: 650
        sound:
          path: /Audio/_Mono/Effects/Alerts/master_caution.ogg
          params:
            loop: true
            volume: 1.2
            pitch: 1.05
            variation: 0.05

  - type: entity
    id: LightFighterBF
    parent: BaseFighterBF
    abstract: true
    components:
    - type: CanMoveInAir
    - type: MovementAlwaysTouching
    - type: Mech
      equipmentWhitelist:
        tags:
        - LightFighterEquipment
   # COMMENTED OUT: Unknown component 'RangeBasedPvs'
   # - type: RangeBasedPvs
   #   sendRange: 1500
   # COMMENTED OUT: Unknown component 'EntityIFFDesignation'
   # - type: EntityIFFDesignation
   #   name: "Fighter Without Name - get one!"

  - type: entity
    id: PowerCageUraniumCell
    name: charged uranium exosuit powercell
    parent: PowerCageHigh
    suffix: Mech Battery
    components:
#    - type: Sprite
#      sprite: _Crescent/Objects/Specific/mechbattery.rsi
#      layers:
#      - state: battery
    - type: Battery
      maxCharge: 7500
      startingCharge: 7500

  - type: entity
    id: FighterUSF22Raptor
    parent: [ LightFighterBF, BaseMech ]
    name: F-22 Raptor
    description: An advanced interceptor starfighter. A tried and tested vessel that served in many naval conflicts across human history - although most detractors criticize how expensive to maintain and over-engineered the shuttle is.
    components:
    # COMMENTED OUT: Unknown component 'EntityIFFDesignation'
   # - type: EntityIFFDesignation
   #   name: "F-22 Raptor"
    - type: Sprite
      scale: 1, 1
      drawdepth: Mobs
      noRot: true
      sprite: _Battlefield14/Objects/Specific/bigfighters.rsi
      layers:
      - map: [ "enum.MechVisualLayers.Base" ]
        state: raptor
    - type: Mech
      maxIntegrity: 1000
      baseState: raptor
      openState: raptor-open
      brokenState: raptor-broken
      mechToPilotDamageMultiplier: 0.2
      airtight: true
      pilotWhitelist:
        components:
          - HumanoidAppearance
    - type: MovementSpeedModifier
      baseWalkSpeed: 0.2
      baseSprintSpeed: 1
      baseWeightlessModifier: 40
    - type: RadarConsole
      maxRange: 512
      followEntity: true
    - type: RadarBlip
      radarColor: "#3760b3" #"#3558a6"
      scale: 5
      requireNoGrid: true
      shape: diamond
    - type: StaticPrice
      price: 15000
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.9
          density: 21390
          mask:
          - MobMask
          layer:
          - MobLayer
          - MachineLayer
          #- FighterImpassable
          # COMMENTED OUT: Invalid enum value 'FighterMask' - not found in physics layer enum
          # layer:
          # - FighterMask
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 150
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            path: /Audio/Machines/warning_buzzer.ogg
            params:
              volume: 5
      - trigger:
          !type:DamageTrigger
          damage: 500
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            path: /Audio/_Mono/Items/sevastopolplush/sevastopolplush-structuraldamage.ogg
            params:
              volume: 5
      - trigger:
          !type:DamageTrigger
          damage: 1500 # Over max integrity so it doesnt just disappear out of nowhere
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:ChangeConstructionNodeBehavior
          node: start
        - !type:DoActsBehavior
          acts: ["Destruction"]

  - type: entity
    id: FighterUSF22RaptorBattery
    parent: FighterUSF22Raptor
    suffix: Battery
    components:
    - type: ContainerFill
      containers:
        mech-battery-slot:
        - PowerCageUraniumCell

  - type: entity
    name: F-22 Raptor Spawner
    id: SpawnFighterF22Raptor
    parent: MarkerBase
    components:
    - type: Sprite
      layers:
        - state: green
        - sprite: _Battlefield14/Objects/Specific/bigfighters.rsi
          state: raptor
    - type: ConditionalSpawner
      prototypes:
        - FighterUSF22RaptorBattery

