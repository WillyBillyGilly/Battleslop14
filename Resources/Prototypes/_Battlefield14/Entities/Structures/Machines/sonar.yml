- type: entity
  id: MachineSonarModuleDebug
  parent: BaseMachinePowered
  name: sonar module
  description: Allows on-grid radar consoles to use sonar.
  suffix: debug
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/drive.rsi
    snapCardinals: true
    layers:
    - state: control
    - state: control_on
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      shader: unshaded
      color: "#349BEB"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: ApcPowerReceiver
    powerLoad: 2000
  - type: PointLight
    enabled: false
    color: "#349BEB"
    radius: 2.0
    energy: 1.5
  - type: LitOnPowered
  - type: ExtensionCableReceiver
  - type: ShipRepairable
    repairTime: 10
    repairCost: 50
