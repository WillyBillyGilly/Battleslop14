- type: entity
  parent: [ClothingBeltStorageBase, ContentsExplosionResistanceBase]
  id: ClothingBeltMilitaryWebbingUS
  name: ALICE belt rig
  description: Standard issue load bearing equipment for oil sniffers.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Belt/us_webbing.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Belt/us_webbing.rsi
  - type: Item
    size: Huge
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Storage
    maxItemSize: Normal
    defaultStorageOrientation: Vertical
    grid:
    - 0,0,7,1
    storageOpenSound:
      collection: BF_Magpouch_Open
      params:
        volume: -3
        variation: 0.125
    storageCloseSound:
      collection: BF_Magpouch_Open
      params:
        volume: -3
        variation: 0.125
    storageInsertSound:
      collection: BF_Magpouch_Insert
      params:
        volume: -1
        variation: 0.125
    storageRemoveSound:
      collection: BF_Magpouch_Remove
      params:
        volume: -1
        variation: 0.125

