- type: entity
  id: WeaponHandlingLauncher
  abstract: true
  components:
  - type: UseDelay
    delay: 2.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: SpeedModifiedOnWield
    walkModifier: 0.70
    sprintModifier: 0.70
  - type: WieldDelay
    baseDelay: 2.5
    modifiedDelay: 2.5
    preventFiring: true
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/explosive_mouse.rsi
      state: all
  - type: ExtendDescription
    descriptionList:
      - description: Has a minimum arming distance of 6 tiles.
        color: "#4f94ad"
        requireDetailRange: true

