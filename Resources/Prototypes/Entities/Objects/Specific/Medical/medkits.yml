- type: entity
  name: first aid kit
  description: It's an emergency medical kit for those serious boo-boos.
  parent: BaseStorageItem
  id: Medkit
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # Frontier: _NF prefix
    state: firstaid
  - type: Storage
    maxItemSize: Small
    defaultStorageOrientation: Vertical # BF14
    grid:
    - 0,0,3,2 # BF14
    whitelist: # BF14
      tags:
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment
        - CigPack
        - PillCanister
        - Radio
        - DiscreteHealthAnalyzer
        - SurgeryTool
        - Dropper
        - GlassBeaker # BF14
        - Tourniquet # BF14
        - Packet # BF14
        - GasTank # BF14
      components:
        - Hypospray
        - Injector
        - Pill
        - HandLabeler
        - SurgeryTool # Shitmed Change
        - BreathMask # BF14
  - type: Item
    size: Normal # BF14
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # Frontier: _NF prefix
    heldPrefix: firstaid
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150
  - type: Tag
    tags:
    - Medkit

- type: entity
  name: burn treatment kit
  description: "A specialized medical kit for when the toxins lab spontaneously burns down."
  parent: Medkit
  id: MedkitBurn
  components:
  - type: Sprite
    state: burnkit
  - type: Item
    heldPrefix: burnkit

- type: entity
  name: toxin treatment kit
  description: "Used to treat toxic blood content."
  parent: Medkit
