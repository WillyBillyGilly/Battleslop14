  id: MagazineRifleASH12Duplex
  name: "ASH-12 magazine (12.7x55 duplex)"
  description: Apparantly one .50 caliber projectile wasn't enough, and ivan decided to put two in the same bullet. Each projectile does less damage on its own but they do more together.
  components:
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle127x55Duplex # thanks to the cartridge firing a spread this means the gun is perfectly accurate, save for the actual spread of the rounds of course
