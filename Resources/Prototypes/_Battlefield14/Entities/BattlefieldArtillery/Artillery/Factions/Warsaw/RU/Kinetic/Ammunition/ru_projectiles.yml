# K-1250 "Molot-N" 125mm APFSDS Sabot
- type: entity
  id: Bullet125mmAPFSDS
  name: 125mm APFSDS projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 120
        Piercing: 90
    deleteOnCollide: false
  - type: SubmunitionProjectile
    submunitionPrototype: Bullet125mmPenetrator
    distanceDelay: 0  # Use time delay only
    submunitionDelay: 0.1  # Release penetrator after 0.1 seconds
    submunitionCount: 1  # Single penetrator only
    spreadAngle: 0
    velocityMultiplier: 2.1  # Penetrator is slightly faster than US version
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/630_armorpiercing_shell_casing.rsi
    layers:
    - state: base-projectile
      scale: 1.9, 1.9
  - type: ShipWeaponProjectile
