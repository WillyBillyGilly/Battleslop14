- type: entity
  name: M9 Beretta
  parent: BaseWeaponPistol
  id: WeaponPistolM9  # USM9
  description: An over-engineered tent spike hammer.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Pistols/M9.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    minAngle: 0
    maxAngle: 15
    angleIncrease: 2
    angleDecay: 10
    fireRate: 5
    projectileSpeed: 30
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/viper_fire.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolM9
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolM9
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgePistol9x19
        priority: 1
        whitelist:
          tags:
            - BF_CartridgePistol9x19
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

