- type: entity
  parent: ColMarTechBase
  id: CMVendNATOUSMCWarVendor
  name: USMC FREEDOM war vendor
  description: Marine-Grade weaponry from a vending machine.
  suffix: ColMarTech
  components:
  - type: Sprite
    sprite: _Battlefield14/Structures/armoury.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
#      shader: unshaded
#    - state: panel
#      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: CMAutomatedVendor
    sections:
    - name: Armour
      choices: { BF14Armour: 1 }
      entries:
      - id: EVAKitCombatUSMC
        name: voidsuit
        recommended: true
#      - id: ClothingOuterArmorPlateCarrierTan
#        name: plate carrier
    - name: Backpack/belt
      choices: { BF14Storage: 2 }
      entries:
      - id: ClothingBackpackRucksackTan
        replaceSlot: back
        name: tan rucksack
        recommended: true
      - id: ClothingBackpackRucksackBlack
        replaceSlot: back
        name: black rucksack
      - id: ClothingBackpackMercenary
        replaceSlot: back
        name: ALICE backpack
      - id: ClothingBeltMilitaryWebbingUS
        replaceSlot: belt
        name: ALICE belt rig
      - id: ClothingBeltAssault
        replaceSlot: belt
        name: assault belt
      - id: ClothingBeltMedicalEMTFilledBF14Basic
        replaceSlot: belt
        name: basic medical belt
        amount: 4
    - name: Weapons
      entries:
      - id: WeaponRifleUSM16A4
        amount: 50
      - id: WeaponRifleUSM4
        amount: 5
      - id: WeaponSniperUSM40A1
        amount: 1
      - id: WeaponSubmachinegunUSMP5
        amount: 5
      - id: WeaponPistolM9
        amount: 2
    - name: Utility
      entries:
      - id: RiotBulletShield
        amount: 3
      - id: CombatKnife
        amount: 10
      - id: JetpackBlackFilled
        amount: 10
      - id: HandHeldMassScanner
        amount: 50
      - id: Crowbar
        amount: 50
    - name: Sustainment
      entries:
      - id: BoxMRE
        amount: 50
      - id: FoodSnackNutribrick
        amount: 50
      - id: DrinkMREFlask
        amount: 50
      - id: OxygenTankFilled
        amount: 50

