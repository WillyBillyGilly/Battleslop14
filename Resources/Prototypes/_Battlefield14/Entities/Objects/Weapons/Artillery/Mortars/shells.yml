## NATO
# US

- type: entity
  id: ShellMortar81M252HEFrag
  parent: DebugMortarShell
  suffix: HE-FRAG, 81mm, M252, NATO, US
  name: M821A4 81mm HE-EF shell
  description: High explosive Enhanced Fragmentation, a mortar shell designed to destroy manpower and light fortifications.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/BattlefieldArtillery/GroundArtillery/Mortar/shells.rsi
    state: HE
  - type: Tag
    tags:
      - MortarShell
      - ShellMortar81M252
  - type: Item
    size: Normal
  - type: MortarShell
    delayPerTile: 0.15
    fireSound: /Audio/_VXS14/Weapons/Guns/Artillery/fire1.ogg
    preExplosionSound: /Audio/_VXS14/Weapons/Guns/Artillery/mortarflyby.ogg
    explosionEntity: ArtilleryMarkerM252HEFrag
    useDirectExplosion: false
  - type: Explosive
    explosionType: Default
    totalIntensity: 60
    intensitySlope: 4
    maxIntensity: 8

