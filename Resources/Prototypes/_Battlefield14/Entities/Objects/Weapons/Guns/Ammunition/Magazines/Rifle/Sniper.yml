- type: entity
  parent: BaseItem
  id: MagazineRifleSV98
  name: "SV-98 magazine (7.62x54mmR)"
  description: A small, 5 round magazine for the SV-98, but dont let its small size fool you, these rounds pack a punch.
  components:
  - type: Tag
    tags:
      - MagazineRifleSV98
      - Magazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle762x54r
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle762x54r
    capacity: 5
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Sniper/SV98.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance

