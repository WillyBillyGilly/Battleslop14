- type: entity
  id: BaseGracePeriodAnnouncerSpawner
  name: grace period announcer spawner
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: generic
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: Appearance
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - TableLayer
  - type: ActiveTimerTrigger
    timeRemaining: 600
  - type: SpawnOnTrigger
    proto: BaseGracePeriodAnnouncer
  - type: DeleteOnTrigger

- type: entity
  id: BaseGracePeriodAnnouncer
  name: grace period announcer
  suffix: DO NOT MAP
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: generic
    - map: ["computerLayerKeys"]
      state: generic_keys
  - type: Appearance
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
        - TableLayer
  - type: ActiveTimerTrigger
    timeRemaining: 6
  - type: DeleteOnTrigger
  - type: AnnounceOnSpawn
    message: "The area is now an active warzone."
    sender: "Combat Area"
    sound:
      path: /Audio/Announcements/bloblarm.ogg
#    color: "#BE8700"

- type: entity
  parent: BaseGracePeriodAnnouncerSpawner
  id: GracePeriodAnnouncerSpawnerBlitz
  name: blitz grace period announcer spawner
  suffix: blitz
  components:
  - type: ActiveTimerTrigger
    timeRemaining: 30
  - type: SpawnOnTrigger
    proto: BaseGracePeriodAnnouncer
  - type: DeleteOnTrigger

