- type: entity
  parent: BaseItem
  id: MagazineRifleASH12
  name: "ASH-12 magazine (12.7x55)"
  description: Big and chunky mag, holding 20 12.7x55 bullets for eradicating "cag operators" in CQB with Russian brutality.
  components:
  - type: Tag
    tags:
      - MagazineRifleASH12
      - Magazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle127x55
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle127x55
    capacity: 20
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Magazine/7.62x51mm/7.62x51mm_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: MagazineRifleASH12
  id: MagazineRifleASH12Duplex
  name: "ASH-12 magazine (12.7x55 duplex)"
  description: Apparantly one .50 caliber projectile wasn't enough, and ivan decided to put two in the same bullet. Each projectile does less damage on its own but they do more together.
  components:
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle127x55Duplex # thanks to the cartridge firing a spread this means the gun is perfectly accurate, save for the actual spread of the rounds of course
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle127x55
    capacity: 20
