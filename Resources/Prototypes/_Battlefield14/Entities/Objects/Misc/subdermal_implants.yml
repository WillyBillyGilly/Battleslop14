- type: entity
  parent: BaseSubdermalImplant
  id: TrackingImplantNATOUS
  name: United States Army tracking implant
  description: This implant has a condition monitor tuned for U.S. comms channels.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      whitelist:
        components:
        - MobState
    - type: TriggerOnMobstateChange
      mobState:
      - Critical
      - Dead
    - type: Rattle
      radioChannel: "USRadio"
      language: "English"

- type: entity
  parent: BaseSubdermalImplant
  id: TrackingImplantPACTRU
  name: Russian Ground Forces tracking implant
  description: This implant has a condition monitor tuned for Russian comms channels.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      whitelist:
        components:
        - MobState
    - type: TriggerOnMobstateChange
      mobState:
      - Critical
      - Dead
    - type: Rattle
      radioChannel: "RURadio"
      language: "Russian"
