# Boxes

- type: entity
  parent: BaseItem
  id: MagazineBoxBF14
  name: ammunition pack
  abstract: true
  components:
  - type: Tag
    tags:
      - AmmunitionBox
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 60
    proto: BF_CartridgeRifle556x45
    whitelist:
      tags:
        - BF_CartridgeRifle556x45
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/5.56x45mm.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: BaseItem
  id: MagazineBox556x45Big
  name: bulk ammunition box (5.56x45mm)
