- type: entity
  id: BarbwireFloor
  name: barbed wire
  description: A coil of barbed wire unrolled on the floor.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: FloorOccluder
  - type: Transform
    anchored: true
  - type: SyncSprite
  - type: Clickable
  - type: Sprite
    sprite: _HaloSSE/Structures/barbwire.rsi
    drawdepth: Mobs
    layers:
      - state: floor
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer: # Not sure why but it displays under blood and catwalks
        - TableLayer
        mask:
        - TableMask
        density: 1000
        hard: false
#  - type: FootstepModifier
#    footstepSoundCollection:
#      collection: FootstepWater
#      params:
#        volume: 8
#  - type: Rotatable
  - type: InteractionOutline
  - type: Slippery # tangles up your feet
  - type: TriggerOnProximity
    triggerspeed: 1
    enabled: true
    cooldown: 3
    shape:
      !type:PhysShapeCircle
      radius: 0.3
  - type: Construction
    graph: BarbwireFloor
    node: barbwirefloor
    deconstructionTarget: start
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Barbwire
#  - type: TriggerOnCollide
  - type: DamageUserOnTrigger
    damage:
      types:
        Slash: 20 # base damage, scales based on mass. DEALS DAMAGE TO ITEMS THROWN OVER IT
  - type: SoundOnTrigger
    sound: /Audio/_RMC14/items/barbed_wire_movement.ogg
  - type: MeleeSound
    soundGroups:
      Brute:
        path: /Audio/Weapons/grille_hit.ogg
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 250 # for nuke
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 200 # for normal destruction
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
