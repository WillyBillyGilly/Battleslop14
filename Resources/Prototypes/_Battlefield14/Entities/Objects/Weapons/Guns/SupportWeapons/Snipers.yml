- type: entity
  name: SV-98
  parent: [BaseWeaponRifle, BaseGunWieldable]
  id: WeaponSniperRUSV98
  description: A modern classic, with a green wooden stock and bolt-action. Chambered in 7.62x54mmR.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/SV98.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Snipers/SV98.rsi
  - type: GunRequiresWield
  - type: Item
    shape:
    - 0,0,5,2
  - type: Gun # TODO make this function like goobstation lever action
    fireRate: 0.5
    projectileSpeed: 50 # it's a sniper
#    damageModifier: 1.5 doesn't work
    soundGunshot:
      path: /Audio/_Battlefield14/Weapons/Guns/misc/lever_fire.ogg
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleSV98
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifleSV98
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeRifle762x54r
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeRifle762x54r
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3000
