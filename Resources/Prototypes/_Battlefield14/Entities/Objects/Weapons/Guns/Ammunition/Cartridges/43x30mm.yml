- type: entity
  id: Cartridge43x30mmIllumination
  name: cartridge (43x30mm illumination flare)
  parent: Cartridge43x30mmHEFrag
  components:
  - type: CartridgeAmmo
    proto: Pellet12_gaugeFlare
