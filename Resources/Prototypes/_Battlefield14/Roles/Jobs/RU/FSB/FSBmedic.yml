- type: job
  id: FSBMedic
  name: job-name-fsb-medic
  description: job-description-fsb-medic
  playTimeTracker: JobFSBMedic
  weight: 75
  startingGear: FSBMedicGearEVA # EVA for spawning on fland
  alwaysUseSpawner: true
  icon: "JobIconPACTMedic"
  requireAdminNotify: false
  supervisors: job-supervisors-rugov
  canBeAntag: false
  special:
  - !type:AddLanguageSpecial
    languagesSpoken:
    - Russian
    - English
    - Esperanto
    languagesUnderstood:
    - Russian
    - English
    - Esperanto
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - FSB
  - !type:AddImplantSpecial
    implants: [ TrackingImplantPACTRU ]
  access:
  - Maintenance
  - Service
  - External
  - Mercenary # Frontier
  - Captain # Frontier
  - PACTCommon
  - PACTCommand
  - PACTMaintenance
  - PACTMedical
  - PACTSoldier
  - PACTArmory
  - Medical

