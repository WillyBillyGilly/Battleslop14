- type: entity
  parent: BF14SyretteBase
  id: BF14SyretteInaprovaline
  suffix: Inaprovaline
  description: A miniature single use syringe. Filled with a mixture of inaprovaline and iron.
  components:
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
        reagents:
