## Misc, power weapons

- type: entity
  parent: CrateBaseSecure
  id: CratePowerWeapon
  name: power weapon crate
  description: It's shut tight and heavily reinforced, but someone with high access could probably open it.
  suffix: power weapon
  components:
  - type: Icon
    sprite: Structures/Storage/Crates/sec_gear.rsi
  - type: Sprite
    sprite: Structures/Storage/Crates/sec_gear.rsi
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750000 # so you cant just magdump it lol you need to unlock it
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: AccessReader
    access: [ ["NATOCommand"] , ["PACTCommand"] ]

