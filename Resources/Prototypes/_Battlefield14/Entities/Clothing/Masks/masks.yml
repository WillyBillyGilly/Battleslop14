- type: entity
  parent: ClothingMaskBase
  id: ClothingBaseGasMask
  abstract: true
  components:
  - type: Clothing
    equipDelay: 1
    unequipDelay: 1
  - type: Item
    size: Small
  - type: BreathMask
  - type: IdentityBlocker
  - type: HideLayerClothing
    slots:
    - Snout
    - Hair
    hideOnToggle: true
  - type: Tag
    tags:
    - HamsterWearable
    - WhitelistChameleon
    - GasMask
  - type: IngestionBlocker
    blockSmokeIngestion: true
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9

- type: entity
  parent: ClothingBaseGasMask
  id: ClothingMaskGasM40
  name: M40 field protective mask
  description: Effective against stuff you reaally dont want in your body.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Mask/M40.rsi
    scale: 0.7, 0.7
  - type: Clothing
    sprite: _Battlefield14/Clothing/Mask/M40.rsi

- type: entity
  parent: [ ClothingMaskBase , ShowSecurityIcons ]
  id: ClothingMaskGasM40Green
  name: M40 field protective mask
  description: Effective against stuff you reaally dont want in your body, upgraded with built-in night vision and heads-up-display.
  suffix: HECU, Night vision
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Mask/M40green.rsi
    scale: 0.7, 0.7
  - type: Clothing
    sprite: _Battlefield14/Clothing/Mask/M40green.rsi
  - type: Item
    size: Small
  - type: BreathMask
  - type: IdentityBlocker
  - type: HideLayerClothing
    slots:
    - Snout
    - Hair
    hideOnToggle: true
  - type: NightVision
    color: "#407614"
    noise: 0.5 #  base noise
    strength: 1 # prevents white tiles looking like shit
    activateSound: /Audio/_Battlefield14/Effects/nightvision.ogg
    flashDurationMultiplier: 1.5
    isEquipment: true
  - type: IngestionBlocker
    blockSmokeIngestion: true

- type: entity
  parent: ClothingMaskGasM40
  id: ClothingMaskGasM40GreenFake
  name: M40 field protective mask
  description: Effective against stuff you reaally dont want in your body.
  suffix: fake
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Mask/M40green.rsi
    scale: 0.7, 0.7
  - type: Clothing
    sprite: _Battlefield14/Clothing/Mask/M40green.rsi

- type: entity
  parent: ClothingBaseGasMask
  id: ClothingMaskGasRussia # yeah no idea what its actually called, the file from c13 was literally just 'russiamask', so im keeping this generic so it can be easily renamed
  name: GP-21 gas mask # a complete guess based off the shape
  description: Effective against stuff you reaally dont want in your body.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Mask/russiamask.rsi
    scale: 0.9, 0.9
  - type: Clothing
    sprite: _Battlefield14/Clothing/Mask/russiamask.rsi
