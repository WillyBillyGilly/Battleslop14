# NATO
- type: entity
  id: LockerArmoryNATO
  name: armoury closet
  parent: NFLockerBaseSecure
  description: It's a personal storage unit for ogovernment issue gear.
  suffix: NATO Common
  components:
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: nfsd
    stateDoorOpen: nfsd_open
    stateDoorClosed: nfsd_door
  - type: AccessReader
    access: [["NATOCommon"]]
  - type: ExtendDescription
    descriptionList:
      - description: "This locker requires 'NATO Common' access."
        fontSize: 12
        color: "#4f94ad"
        requireDetailRange: true

- type: entity
  id: LockerArmoryNATOSoldier
  name: armoury closet
  parent: LockerArmoryNATO
  suffix: NATO Soldier
  components:
  - type: Appearance
  - type: AccessReader
    access: [["NATOSoldier"]]
  - type: ExtendDescription
    descriptionList:
      - description: "This locker requires 'NATO Soldier' access."
        fontSize: 12
        color: "#4f94ad"
        requireDetailRange: true

