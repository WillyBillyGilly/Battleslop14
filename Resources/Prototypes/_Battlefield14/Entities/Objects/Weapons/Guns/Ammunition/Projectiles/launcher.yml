- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocket84mmHEAT # High explosive anti tank, pierces and does damage on the inside
  name: 84mm HEAT rocket
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 2000
        Piercing: 250
    deleteOnCollide: false
  - type: ArmorPiercing
    piercingThickness: 7
  - type: Heat
    explosionDelay: 0.1
    fragmentationDelay: 0.1
    fragmentationCount: 40
    fragmentationPrototype: Bullet84mmHEATFragment
  - type: StaminaDamageOnCollide
    damage: 200 # It's a fucking rocket
