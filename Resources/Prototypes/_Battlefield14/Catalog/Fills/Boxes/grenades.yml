## Charges

# RU

- type: entity
  name: box of APM-6 cluster charges
  parent: BoxMagazine
  id: BoxChargeFuze
  description: A box full of APM-6 cluster charges.
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,3
    whitelist:
      tags:
        - RemoteSignaller
        - Multitool
      components:
        - Sticky
  - type: StorageFill
    contents:
      - id: FuzeCharge
        amount: 4

- type: entity
  name: APM-6 cluster charge kit
  parent: BoxChargeFuze
  id: BoxChargeFuzeKit
  description: A box containing one APM-6 cluster charge, a detonator, and a multitool.
  components:
  - type: StorageFill
    contents:
      - id: FuzeCharge
      - id: RemoteSignallerClacker
      - id: Multitool
