- type: reagent
  id: KaolinVX
  name: Kaolin
  group: Medicine
  desc: Clotting powder, earthy
  physicalDesc: reagent-physical-desc-powdery
  flavor: earthy
  color: "#ffd7a8"
  metabolisms:
    Medicine:
      metabolismRate: 0.1
      effects:
      - !type:HealthChange
        damage:
          types:
#BF14            Bloodloss: -1.5
            Poison: -0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 5.5 # BF14 5 > 5.5
        damage:
          types:
            Poison: 1
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 10
        probability: 0.02
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:ModifyBleedAmount
        amount: -4
