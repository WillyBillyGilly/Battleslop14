# Rifles - US

- type: entity
  name: M16A1
  parent: BaseWeaponRifle
  id: WeaponRifleUSM16A1
  description: The classic American slugthrower.
  components:
  - type: Item # Controls inhand sprites
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/M16A2.rsi
  - type: Icon
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/iconstates.rsi
    state: icon-full-M16A4
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/iconstates.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: carryhandle
      - state: stock-full
      - state: rifle-length-barrel-M16
      - state: mag-20-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/M16A2.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -14
    maxAngle: -17
  - type: Gun
    minAngle: 16
    maxAngle: 30
    angleIncrease: 1
    projectileSpeed: 55 # twenty inch barrel
    availableModes:
    - SemiAuto
    - FullAuto
    selectedMode: FullAuto
    soundGunshot:
      collection: BF_M16_Gunshots
      params:
        volume: -5
        variation: 0.125
    fireRate: 7
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/M16/rack.ogg
      params:
        volume: -2
    soundBoltClosed:
      path: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_chamber_press.ogg
      params:
        volume: -5
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleSTANAGShort
        insertSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifleSTANAG
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeRifle556x45
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeRifle556x45
  - type: MagazineVisuals
    magState: mag-20
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ExtendDescription
    descriptionList:
      - description: Takes STANAG magazines.
        color: "#4f94ad"
        requireDetailRange: true

