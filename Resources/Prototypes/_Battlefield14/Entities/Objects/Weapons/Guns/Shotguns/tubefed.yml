    proto: BF_CartridgeShotgun12GaugeBuckshot

- type: entity
  name: M590
  parent: BaseWeaponShotgun
  id: WeaponShotgunUSM590
  description: A popular civilian hunting shotgun, chopped down to breach doors more handily. Direct combat use ill-advised.
  components:
  - type: Item
    size: Normal
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Shotguns/Helepolis.rsi
  - type: Gun
    fireRate: 2
    projectileSpeed: 20 # short barrel
  - type: GunSpreadModifier
    spread: 1.5 # short barrel
  - type: Tag
    tags:
    - WeaponShotgunKammerer
  - type: BallisticAmmoProvider
    autoCycle: false
    whitelist:
      tags:
      - BF_CartridgeShotgun12Gauge
    capacity: 4
    proto: BF_CartridgeShotgun12GaugeBreaching
