- type: entity
  id: ColMarTechBase
  name: ColMarTech vendor
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Tag
    tags:
    - Structure
  - type: Sprite
    sprite: _Battlefield14/Structures/armoury.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
#      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: UserInterface
    interfaces:
      enum.CMAutomatedVendorUI.Key:
        type: CMAutomatedVendorBui
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 3
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/vending_machine_hum.ogg
  - type: ActivatableUI
    key: enum.CMAutomatedVendorUI.Key
  - type: ActivatableUIRequiresAccess
  - type: WallMount
    arc: 360

- type: entity
  abstract: true
  parent: ColMarTechBase
  id: ColMarTechBaseAnchorable
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
  - type: Pullable
  - type: Physics
    bodyType: Static
  - type: Damageable
    damageContainer: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
        - BulletImpassable
