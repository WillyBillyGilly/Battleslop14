# shit i wanted to put here to not clog up the rifles file, which should probably be segregated by nation at some point
# AKA this is for unique/one off weapons or even power weapons

- type: entity
  name: M-30 MR-C
  parent: BaseWeaponRifle
  id: WeaponRifleUSM30MRC
  description: Cal 6.8x52, model 30, modular rifle caseless. The culmination of decades of research into caseless ammunition, the first practical caseless rifle.
  components:
  - type: Item
    size: Huge
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -20
  - type: Gun
    minAngle: 21
    maxAngle: 32
    availableModes:
    - SemiAuto
    - FullAuto
    - Burst
    selectedMode: FullAuto
    fireRate: 8
    projectileSpeed: 45
    shotsPerBurst: 3
    burstCooldown: 0.3
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/light_rifle_1.ogg
  - type: ChamberMagazineAmmoProvider
    boltClosed: null # It's caseless so it doesn't need a bolt, see G11
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaseless # NOT BF14
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg
        swap: false
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless # NOT BF14
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless # NOT BF14
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 750

- type: entity
  name: M42A5
  parent: BaseWeaponRifle
  id: WeaponRifleUSM42A5
  description: Something isn't right here.
  components:
  - type: Item # Controls inhand sprites
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi # Teeeemp
  - type: Icon
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/M42A5.rsi
    state: icon
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/M42A5.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Rifles/AR15/M4A1.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -14
    maxAngle: -17
  - type: Gun
    minAngle: 16
    maxAngle: 30
    angleIncrease: 1
    projectileSpeed: 50
    availableModes:
    - SemiAuto
    - FullAuto
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/m41.ogg
      params:
        variation: 0.125
    fireRate: 7.5
  - type: ChamberMagazineAmmoProvider
    soundBoltClosed:
      path: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_chamber_press.ogg
      params:
        volume: -5
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaselessBig # NOT BF14
        insertSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/M16/uc_m16_magout.ogg
        swap: false
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless # NOT BF14
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless # NOT BF14
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless # NOT BF14
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: true
  - type: Appearance

