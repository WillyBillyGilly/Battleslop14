# US

- type: entity
  name: M67 Grenade
  description: The classic GI hand grenade post vietnam.
  parent: GrenadeBase
  id: DefensiveGrenadeUSM67
  components:
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: RandomTimerTrigger
    min: 3
    max: 5
  - type: Tag
    tags:
      - Grenade
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Grenades/m67.rsi
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: ProjectileGrenade
    fillPrototype: BulletGrenadeM67Fragment
    capacity: 30
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HandGrenade
    totalIntensity: 50
    intensitySlope: 4
    maxIntensity: 6
    maxTileBreak: 0
  - type: TimerTriggerVisuals
    primingSound:
      path: "/Audio/_Battlefield14/Weapons/Grenades/trigger2.ogg"
  - type: EmitSoundOnPickup
    sound: /Audio/_Battlefield14/Weapons/Grenades/grab1.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_Battlefield14/Weapons/Grenades/drop1.ogg
  - type: EmitSoundOnLand
    sound:
      collection: FragGrenadeSFX
  - type: ExtendDescription
    descriptionList:
      - description: Has a random timer between 3-5 seconds, produces shrapnel.
        fontSize: 12
        color: "#4f94ad"
        requireDetailRange: true

- type: entity
  id: BulletGrenadeM67Fragment
  name: M67 grenade fragment
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Slash: 8
        Piercing: 8
  - type: StaminaDamageOnCollide
    damage: 2 # ~50 hits to stun
    deleteOnCollide: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: shard
  - type: TimedDespawn
    lifetime: 1
  - type: PointLight
    radius: 1
    color: orange
    energy: 0.2

- type: entity
  name: MK21 Offensive Grenade
  description: USMC standard issue blast grenade.
  parent: GrenadeBase
  id: OffensiveGrenadeUSMK21
  components:
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: RandomTimerTrigger
    min: 3
    max: 5
  - type: Tag
    tags:
      - Grenade
      - OffensiveGrenadeUSMK21
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Grenades/MK21.rsi
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HandGrenade
    maxIntensity: 10
    intensitySlope: 4
    totalIntensity: 100
    canCreateVacuum: false
  - type: TimerTriggerVisuals
    primingSound:
      path: "/Audio/_Battlefield14/Weapons/Grenades/trigger2.ogg"
  - type: EmitSoundOnPickup
    sound: /Audio/_Battlefield14/Weapons/Grenades/grab1.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_Battlefield14/Weapons/Grenades/drop1.ogg
  - type: EmitSoundOnLand
    sound:
      collection: FragGrenadeSFX
  - type: ExtendDescription
    descriptionList:
      - description: Has a random timer between 3-5 seconds.
        color: "#4f94ad"
        requireDetailRange: true
  - type: Material
  - type: Construction
    graph: MK21StackTwo
    node: start
    deconstructionTarget: start

- type: entity
  name: double stacked MK21 hand grenade
  description: two MK21 blast grenades stacked together.
  parent: OffensiveGrenadeUSMK21
  id: OffensiveGrenadeUSMK21StackTwo
  components:
  - type: Item
    size: Normal
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: RandomTimerTrigger
    min: 3
    max: 5
  - type: Tag
    tags:
      - Grenade
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Grenades/MK21StackTwo.rsi
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: DemolitionCharge
    maxIntensity: 12.5
    intensitySlope: 8
    totalIntensity: 135
    canCreateVacuum: true
  - type: TimerTriggerVisuals
    primingSound:
      path: "/Audio/_Battlefield14/Weapons/Grenades/trigger2.ogg"
  - type: EmitSoundOnPickup
    sound: /Audio/_Battlefield14/Weapons/Grenades/grab1.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_Battlefield14/Weapons/Grenades/drop1.ogg
  - type: EmitSoundOnLand
    sound:
      collection: FragGrenadeSFX
  - type: Construction
    graph: MK21StackTwo
    node: MK21Unstack
    deconstructionTarget: MK21Unstack

- type: entity
  name: MK21 Offensive Grenade Sword
  description: You crazy son of a bitch.
  parent: OffensiveGrenadeUSMK21
  id: OffensiveGrenadeUSMK21Sword
  components:
  - type: Item
    size: Large
  - type: OnUseTimerTrigger
    delay: 3.5
  - type: RandomTimerTrigger
    min: 3
    max: 5
  - type: Tag
    tags:
      - Grenade
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Grenades/MK21sword.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Blunt: 35
    soundHit:
      collection: MetalThud
    bluntStaminaDamageFactor: 1.25
#    heavyRateModifier: 1.25
#    heavyDamageBaseModifier: 1.2
#    heavyStaminaCost: 1.5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 10
#    staminaCost: 65
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: HandGrenade
    maxIntensity: 500
    intensitySlope: 5
    totalIntensity: 1000
    canCreateVacuum: true
  - type: TimerTriggerVisuals
    primingSound:
      path: "/Audio/_Battlefield14/Weapons/Grenades/trigger2.ogg"
  - type: EmitSoundOnPickup
    sound: /Audio/_Battlefield14/Weapons/Grenades/grab1.ogg
  - type: EmitSoundOnDrop
    sound: /Audio/_Battlefield14/Weapons/Grenades/drop1.ogg
  - type: EmitSoundOnLand
    sound:
      collection: FragGrenadeSFX

