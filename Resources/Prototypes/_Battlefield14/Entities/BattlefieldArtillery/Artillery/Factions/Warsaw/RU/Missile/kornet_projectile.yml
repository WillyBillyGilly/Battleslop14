# Kornet-N Missile Projectile (PACT Main HEAT)
- type: entity
  id: BulletKornetN
  name: Kornet-N missile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 400
        Piercing: 200
        Heat: 150
    deleteOnCollide: false
  - type: ArmorPiercing
    piercingThickness: 80
  - type: Heat
    explosionDelay: 0
    fragmentationDelay: 0
    fragmentationCount: 24
    fragmentationPrototype: BulletKornetNFragment
    plasmaAmount: 100
    plasmaTemperature: 2500
    plasmaReleaseDelay: 0
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 350
    intensitySlope: 8
    maxIntensity: 50
    maxTileBreak: 4
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectSmall
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 2
    requireNoGrid: true
    shape: hexagon
  - type: TimedDespawn
    lifetime: 8
  - type: PointLight
    radius: 4
    color: orange
    energy: 0.6
  - type: PassiveThermalSignature
    signature: 500000
  - type: ThermalSignature
  - type: GatheringProjectile
  - type: MiningGatheringSoft
  - type: MiningGatheringHard
  - type: TargetGuided
    turnRate: 140
    acceleration: 200
    maxSpeed: 200
    launchSpeed: 70
    maxLifetime: 45

# Kornet-N Fragment
- type: entity
  id: BulletKornetNFragment
  name: Kornet-N fragment
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 25
        Piercing: 20
    deleteOnCollide: true
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/50_armorpiercing_machinegun_casing.rsi
    layers:
    - state: base-projectile
    scale: 0.5, 0.5
  - type: ShipWeaponProjectile
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    color: orange
    energy: 0.3
  - type: RadarBlip
    scale: 0.6
    requireNoGrid: true
    shape: triangle
    radarColor: "#FF9900"

