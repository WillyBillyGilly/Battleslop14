# SMAW

- type: entity
  id: CartridgeSMAWHEAA
  name: "SMAW cartridge (HEAA)"
  parent: BaseCartridge
  description: High explosive anti armour, pierces and does damage on the inside, like HEAT.
  components:
  - type: Item
    size: Large
  - type: Tag
    tags:
    - CartridgeLauncher
    - CartridgeSMAW
  - type: CartridgeAmmo
    proto: BulletRocket84mmHEATArmingDistance
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Launcher/SMAW.rsi
    layers:
