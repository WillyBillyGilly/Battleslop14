- type: entity
  id: CamonetFloor
  name: camouflage netting
  description: A blanket of camo netting unrolled on the floor.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: SyncSprite
  - type: Clickable
  - type: Sprite
    sprite: _Civ14/Objects/structures.rsi
    drawdepth: OverMobs
    layers:
      - state: camonet_opaque
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.9
    sprintSpeedModifier: 0.9
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
        - TableLayer
        mask:
        - TableMask
        density: 1000
        hard: false
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Web
  - type: SpriteFade
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 150 # for nuke
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 80 # for normal destruction
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DisassembleOnAltVerb
    prototype: Camonet1
    doAfter: 3
