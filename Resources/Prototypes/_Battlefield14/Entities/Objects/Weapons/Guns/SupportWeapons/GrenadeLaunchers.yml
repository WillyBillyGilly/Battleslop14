# US
- type: entity
  name: M320
  parent: WeaponFlareGun
  id: WeaponGrenadeLauncherUSM320
  description: The United States replacement to the classic M203 that allows for loading of longer cartridges, which despite contract requirements is heavier than the M203.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/GrenadeLaunchers/M320.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Normal
    sprite: _Battlefield14/Objects/Weapons/Guns/GrenadeLaunchers/M320.rsi
    storedSprite:
      sprite: _Battlefield14/Objects/Weapons/Guns/GrenadeLaunchers/M320.rsi
      state: storage
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/GrenadeLaunchers/M320.rsi
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        insertSound: /Audio/_Battlefield14/Weapons/Guns/M320/gl_insert.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/M320/gl_remove.ogg
        priority: 1
        whitelist:
          tags:
            - Cartridge40x46mmGrenade
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/_Battlefield14/Weapons/Guns/M320/gl_fire.ogg
#      params:
#        volume: -5
#        variation: 0.125

- type: entity
  name: M320
  parent: WeaponGrenadeLauncherUSM320
  id: WeaponGrenadeLauncherUSM320HE
