- type: pointOfInterest
  id: INDBox
  parent: BasePOI
  name: 'Independant Box Station'
  minimumDistance: 0
  maximumDistance: 0
  spawnGamePreset: [ Battlefield14 , NFAdventure ]
  spawnGroup: Required
  gridPath: /Maps/_Battlefield14/Stations/IND/box.yml
  addComponents:
  - type: IFF
    color: "#047abd"
    flags: [HideLabel]
    readOnly: true

- type: gameMap
  id: BF14Box
  mapName: 'Box Station'
  mapPath: /Maps/_Battlefield14/Stations/IND/box.yml
  minPlayers: 0
  maxPlayers: 120
  randomRotation: false
  maxRandomOffset: 0
  stations:
    BF14Box:
      stationProto: StandardFrontierStation
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Independant "Box" Station'
        - type: ExtraStationInformation
          iconPath: /Textures/_NF/Structures/Decoration/banner.rsi/nfsd-banner.png
          stationSubtext: 'frontier-lobby-frontier-subtext'
          stationDescription: 'frontier-lobby-frontier-subtext'
          lobbySortOrder: 1
        - type: StationJobs
          availableJobs:
#            Contractor: [ -1, -1 ]
            USMCSquadLeader: [ 1, 1 ]  # debug remove all these jobs when gamemode is fully working
            USMCRifleman: [ 4, 4 ]
            USMCAutomaticRifleman: [ 4, 4 ]
            USMCMedic: [ 4, 4 ]
            USMCRecon: [ 4, 4 ]
            VDVSquadLeader: [ 1, 1 ]
            VDVRifleman: [ 4, 4 ]
            VDVAutomaticRifleman: [ 4, 4 ]
            VDVMedic: [ 4, 4 ]
            VDVRecon: [ 4, 4 ]
