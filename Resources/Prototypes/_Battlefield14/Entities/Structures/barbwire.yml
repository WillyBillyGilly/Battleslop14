- type: entity
  id: BarbwireFloor
  name: barbed wire
  description: A coil of barbed wire unrolled on the floor.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: FloorOccluder
  - type: Transform
    anchored: true
  - type: SyncSprite
  - type: Clickable
  - type: Sprite
    sprite: _Battlefield14/Structures/barbwire.rsi
    drawdepth: BelowFloor
    layers:
      - state: floor
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
          - SlipLayer # LowImpassable ? this thing goes under catwalks visually
        mask:
          - ItemMask
        density: 1000
        hard: false
#  - type: FootstepModifier
#    footstepSoundCollection:
#      collection: FootstepWater
#      params:
#        volume: 8
  - type: Rotatable
  - type: InteractionOutline
  - type: Slippery # tangles up your feet
  - type: StepTrigger
    intersectRatio: 0.1
  - type: Construction
    graph: BarbwireFloor
    node: barbwirefloor
    deconstructionTarget: start
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Barbwire
  - type: MeleeSound
    soundGroups:
      Brute:
        path: /Audio/Weapons/grille_hit.ogg
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 250 # for nuke
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 200 # for normal destruction
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
