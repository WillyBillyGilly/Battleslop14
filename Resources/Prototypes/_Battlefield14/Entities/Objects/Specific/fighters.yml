  - type: entity
    id: BaseFighterBF
    abstract: true
    components:
    - type: Mech
      maxEquipmentAmount: 3
#     - type: CanBeHeatTracked
#     - type: ProximityFuseTarget
    - type: Physics
      bodyType: Dynamic
    - type: PassiveThermalSignature
      signature: 250000 # ~1km
    - type: ThermalSignature
      storedHeat: 2
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.9
          density: 21390
          #mask:
          #- FighterImpassable
          # COMMENTED OUT: Invalid enum value 'FighterMask' - not found in physics layer enum
          # layer:
          # - FighterMask

  - type: entity
    id: LightFighterBF
    parent: BaseFighterBF
    abstract: true
    components:
    - type: CanMoveInAir
    - type: MovementAlwaysTouching
    - type: Mech
      equipmentWhitelist:
        tags:
        - LightFighterEquipment
   # COMMENTED OUT: Unknown component 'RangeBasedPvs'
   # - type: RangeBasedPvs
   #   sendRange: 1500
   # COMMENTED OUT: Unknown component 'EntityIFFDesignation'
   # - type: EntityIFFDesignation
   #   name: "Fighter Without Name - get one!"

  - type: entity
    id: PowerCageUraniumCell
    name: charged uranium exosuit powercell
    parent: PowerCageHigh
    suffix: Mech Battery
    components:
#    - type: Sprite
#      sprite: _Crescent/Objects/Specific/mechbattery.rsi
#      layers:
#      - state: battery
    - type: Battery
      maxCharge: 7500
      startingCharge: 7500

  - type: entity
    id: FighterUSF22Raptor
    parent: [ LightFighterBF, BaseMech ]
    name: F-22 Raptor
    description: An advanced interceptor starfighter. A tried and tested vessel that served in many naval conflicts across human history - although most detractors criticize how expensive to maintain and over-engineered the shuttle is.
    components:
    # COMMENTED OUT: Unknown component 'EntityIFFDesignation'
   # - type: EntityIFFDesignation
   #   name: "F-22 Raptor"
    - type: Sprite
      scale: 1, 1
      drawdepth: Mobs
      noRot: true
      sprite: _Battlefield14/Objects/Specific/bigfighters.rsi
      layers:
      - map: [ "enum.MechVisualLayers.Base" ]
        state: raptor
    - type: Mech
      maxIntegrity: 1000
      baseState: raptor
      openState: raptor-open
      brokenState: raptor-broken
      mechToPilotDamageMultiplier: 0.2
      airtight: true
      pilotWhitelist:
        components:
          - HumanoidAppearance
    - type: MovementSpeedModifier
      baseWalkSpeed: 0.2
      baseSprintSpeed: 1
      baseWeightlessModifier: 40
    - type: RadarConsole
      maxRange: 512
      followEntity: true
    - type: RadarBlip
      radarColor: "#3558a6"
      scale: 3
      requireNoGrid: true
      shape: diamond
#    - type: ProjectileIFF
#      visualType: Diamond
#      color: "#203564"
#      scale: 3
    - type: StaticPrice
      price: 15000
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.9
          density: 21390
          mask:
          - MobMask
          layer:
          - MobLayer
          - MachineLayer
          #- FighterImpassable
          # COMMENTED OUT: Invalid enum value 'FighterMask' - not found in physics layer enum
          # layer:
          # - FighterMask

  - type: entity
    id: FighterUSF22RaptorBattery
    parent: FighterUSF22Raptor
    suffix: Battery
    components:
    - type: ContainerFill
      containers:
        mech-battery-slot:
        - PowerCageUraniumCell

  - type: entity
    name: F-22 Raptor Spawner
    id: SpawnFighterF22Raptor
    parent: MarkerBase
    components:
    - type: Sprite
      layers:
        - state: green
        - sprite: _Battlefield14/Objects/Specific/bigfighters.rsi
          state: raptor
    - type: ConditionalSpawner
      prototypes:
        - FighterUSF22RaptorBattery

