
# 17.76mm TRUMPCARD Railgun
- type: entity
  id: Magazine1776mmRailgun
  name: "17.76mm TRUMPCARD railgun magazine"
  description: "An ammunition loader for the TRUMPCARD railgun. Contains 17.76mm electromagnetic projectiles."
  parent: [BaseItem, RecyclableItemSteelSmall]
  components:
  - type: Tag
    tags:
    - Magazine1776mmRailgun
  - type: Item
    size: Huge
  - type: BallisticAmmoProvider
    infiniteUnspawned: false
    proto: Cartridge1776mmRailgun
    capacity: 1
    mayTransfer: true
    whitelist:
      tags:
      - Cartridge1776mmRailgun
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/generic_shipgun_box.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance
  - type: StaticPrice
    price: 1

- type: entity
  id: Cartridge1776mmRailgun
  name: 17.76mm depleted uranium penetrator
  parent: BaseCartridge
  suffix: trumpcard
  components:
  - type: Tag
    tags:
    - Cartridge
    - Cartridge1776mmRailgun
  - type: Item
    size: Ginormous
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: Bullet1776mmRailgun
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/BattlefieldArtillery/Cartridges/Trumpcard.rsi
    layers:
    - state: icon
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
#  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: MultiHandedItem
  - type: ClothingSpeedModifier
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: HeldSpeedModifier

