- type: entity
  name: KS-K
  parent: BaseWeaponRifle # BaseWeaponShotgun breaks the gun right now
  id: WeaponShotgunRUKSK
  description: A semi-automatic shotgun based on the kalashnikov platform.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Shotguns/KSK.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Battlefield14/Objects/Weapons/Guns/Shotguns/KSK.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: Gun
    availableModes:
    - SemiAuto
    selectedMode: SemiAuto
    fireRate: 2
    projectileSpeed: 35
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/bigshotgun_fire.ogg
      params:
        volume: -5
        variation: 0.125
  - type: GunRequiresWield
  - type: ChamberMagazineAmmoProvider
    boltClosed: null # means the bolt doesnt lock back like M16 pattern rifles, also means you need to cycle the gun after an empty mag
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineShotgunKSK
        insertSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/AK_545/uc_ak_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineShotgunKSK
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgeShotgun12GaugeBuckshot
        priority: 1
        whitelist:
          tags:
            - BF_CartridgeShotgun12Gauge
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _RMC14/Interface/MousePointer/shotgun_mouse.rsi
      state: all

