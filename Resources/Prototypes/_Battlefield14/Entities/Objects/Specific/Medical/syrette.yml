- type: entity
  name: syrette
  parent: BaseItem
  description: A miniature single use syringe.
  id: BF14SyretteBase
  abstract: true
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/syrette.rsi
    layers:
    - state: syrette
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 5
  - type: ExaminableSolution
    solution: pen
  - type: Hypospray
    solutionName: pen
    transferAmount: 10
    onlyAffectsMobs: false
    injectOnly: true
  - type: UseDelay
    delay: 0.2
  - type: Appearance
  - type: Tag
    tags:
    - Syrette
  - type: TrashOnSolutionEmpty
    solution: pen

- type: entity
  parent: BaseItem
  id: BF14SyretteCappedBase
  abstract: true
  name: syrette
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/syrette.rsi
    layers:
    - state: syrette
    - state: cap_red
  - type: SpawnItemsOnUse
    items:
    - id: BF14SyretteCapRed
    - id: BF14SyretteInaprovaline
    sound:
      path: /Audio/Items/Handcuffs/rope_breakout.ogg
      params:
        variation: 0.125
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Syrette

- type: entity
  parent: BaseItem
  id: BF14SyretteCapBase
  name: syrette cap
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Specific/Medical/syrette.rsi
    layers:
    - state: cap_red
  - type: Item
    size: Tiny
  - type: SpaceGarbage
  - type: ActiveTimerTrigger
    timeRemaining: 30
  - type: DeleteOnTrigger
  - type: Tag
    tags:
    - Trash

