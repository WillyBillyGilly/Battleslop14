#    maxIntensity: 50
#    maxTileBreak: 2

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocket83mmNE
  name: 83mm Novel Explosive rocket # anti infantry, explodes on contact and sends fragments everywhere with a wide explosive for killing infantry
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 150
        Blunt: 150
  - type: HeFragProjectile
    fillPrototype: Bullet84mmHEATFragment
    capacity: 40
    randomAngle: true
    minVelocity: 8
    maxVelocity: 15
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 300
    intensitySlope: 5
    maxIntensity: 25
    maxTileBreak: 0
  - type: StaminaDamageOnCollide
    damage: 200 # It's a fucking rocket

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocket83mmHEDM
  name: 83mm HEDM rocket # High explosive dual mode, explodes on contact in a small area to blast open walls and such
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: frag
  - type: Projectile
    damage:
      types:
        Structural: 400
        Blunt: 150
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 300
    intensitySlope: 25
    maxIntensity: 100
    maxTileBreak: 2
  - type: StaminaDamageOnCollide
    damage: 200 # It's a fucking rocket

- type: entity
  id: Bullet84mmHEATFragment
  name: 84mm HEAT fragment
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Structural: 30
        Slash: 15
        Piercing: 15
  - type: StaminaDamageOnCollide
    damage: 15 # ~7 hits to stun
    deleteOnCollide: true
  - type: Sprite
    sprite: _Mono/Objects/SpaceArtillery/50_armorpiercing_machinegun_casing.rsi
    layers:
    - state: base-projectile
    scale: 0.3, 0.3
  - type: ShipWeaponProjectile
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    radius: 0.8
    color: orange
    energy: 0.15
  - type: RadarBlip
    scale: 0.4
    requireNoGrid: true
    shape: triangle
    radarColor: "#FF9900"
