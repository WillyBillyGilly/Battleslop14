# Distinct from the ones in _Battlefield14\Entities\BattlefieldArtillery\Artillery\Factions\Nato\US\Kinetic\Ammunition but similar, chemicalsmoke and plasmagas dont work well with infantry gameplay

- type: entity
  id: Cartridge43x30mmHEFrag
  name: cartridge (43x30mm HE-Frag)
  parent: BaseCartridge
  components:
  - type: Item
    size: Small
  - type: Tag
    tags:
    - Cartridge
    - Cartridge43x30mmGrenade
    - Grenade
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: Bullet43x30mmHEFragArmingDistance
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: frag
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
  - type: Explosive
    explosionType: HandGrenade
    maxIntensity: 100
    intensitySlope: 3
    totalIntensity: 1.5
  - type: ExplodeOnTrigger
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  id: Cartridge43x30mmThermobaric
  name: cartridge (43x30mm Thermobaric)
  parent: Cartridge43x30mmHEFrag
  components:
  - type: CartridgeAmmo
    proto: Bullet43x30mmThermobaricArmingDistance

