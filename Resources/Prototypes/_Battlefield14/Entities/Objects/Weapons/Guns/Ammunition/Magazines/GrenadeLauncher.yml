- type: entity
  parent: BaseItem
  id: MagazineGrenadeLauncherXM25HE
  name: "M-25 magazine (25x40mm HE)"
  description: A 5 round magazine for the 25x40mm fuck off bullet that fucking kills you.
  components:
  - type: Tag
    tags:
      - MagazineGrenadeLauncherXM25
  - type: BallisticAmmoProvider
    proto: BF_CartridgeGrenade25x40HE
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeGrenade25x40
    capacity: 5
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/GrenadeLauncher/XM25.rsi
    layers:
    - state: base-red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    scale: 1.5, 1.5
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance

