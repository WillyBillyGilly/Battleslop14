- type: entity
  parent: BaseBattlemap
  id: MapCustoms
  name: 'hand drawn map (Norvinsk customs)'
  description: It's a map of Norvinsk customs, theres no way they want you to use this to navigate around.
  components:
    - type: Item
      size: Tiny
    - type: Sprite
      sprite: _Battlefield14/Objects/Misc/maps.rsi
      state: customs
    - type: TabletopGame
      size: 1200, 700
      setup:
        !type:TabletopEmptySetup
        boardPrototype: PhotoMapCustoms

- type: entity
  parent: BaseBattlemap
  id: MapTaurus
  name: 'map (taurus)'
  description: It's a map of Taurus, Florida. The red squares mark objectives.
  components:
    - type: Item
      size: Tiny
    - type: Sprite
      sprite: Objects/Misc/bureaucracy.rsi
      state: paper_dotmatrix
    - type: TabletopGame
      size: 190, 200
      setup:
        !type:TabletopEmptySetup
        boardPrototype: PhotoMapTaurus

- type: entity
  parent: BaseBattlemap
  id: MapSpringfield
  name: 'map (springfield)'
  description: It's a map of Springfield, Kentucky. The red squares mark objectives.
  components:
    - type: Item
      size: Tiny
    - type: Sprite
      sprite: Objects/Misc/bureaucracy.rsi
      state: paper_dotmatrix
    - type: TabletopGame
      size: 370, 335
      setup:
        !type:TabletopEmptySetup
        boardPrototype: PhotoMapSpringfield

