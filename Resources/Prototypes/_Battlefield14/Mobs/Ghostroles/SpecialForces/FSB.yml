# Base
- type: entity
  parent: MobHuman
  id: MobHumanFSBBase
  name: vlad FSB
  suffix: Human, Base, FSB, BF14
  components:
  - type: HumanoidAppearance
    height: 1.0
    width: 1.0
  - type: Loadout
    prototypes: [FSBRiflemanGear]
  - type: GhostRole
    name: job-name-fsb-rifleman
    description: job-description-fsb-rifleman
    rules: ghost-role-information-fsb-rules
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameSegments:
    - SyndicateNamesPrefix
    - SyndicateNamesNormal # OPSEC bro..
  - type: NpcFactionMember
    factions:
    - FSB
  - type: Company
    companyName: VDV
  - type: SurgerySpeedModifier
    speedModifier: 1.5
  - type: LanguageKnowledge # Einstein Engines
    speaks:
    - Russian
    - English
    - Esperanto
    - Sign
    understands:
    - Russian
    - English
    - Esperanto
    - Sign
    - TauCetiBasic

