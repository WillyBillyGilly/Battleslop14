- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: BulletRocketS8
  name: 80mm S-8 rocket
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/fighterweapon_projectiles.rsi
    layers:
    - state: FFAR
  - type: Projectile
    damage:
      types:
        Structural: 40
        Blunt: 40
  - type: HeFragProjectile
    fillPrototype: Bullet25x40Fragment
    capacity: 16
    randomAngle: true
    minVelocity: 8
    maxVelocity: 15
  - type: ShipWeaponProjectile
  - type: RadarBlip
    radarColor: "#FCBA03"
    scale: 1
    requireNoGrid: true
    shape: triangle
  - type: TimedDespawn
    lifetime: 4 # approx 256 meter range
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 30
    intensitySlope: 1.5
    maxIntensity: 10
    maxTileBreak: 1
  - type: StaminaDamageOnCollide
    damage: 40 # ~3 hits to stun
