# Storage

- type: entity
  parent: ClothingArmbandBase
  id: ClothingArmbandDumpPouchBlack
  name: black dump pouch
  description: A small bag which you can strap on your leg, able to store small items such as loose shot shells, tools, or empty magazines.
  components:
  - type: Item
    size: Large
  - type: Sprite
    sprite: _Battlefield14/Clothing/Accessories/dumppouchblack.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Accessories/dumppouchblack.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT
  - type: Storage
    grid:
    - 0,0,2,1
    maxItemSize: Small
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: UseDelay # to prevent bag open/honk spam
    delay: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9

# Holsters/Sheaths

- type: entity
  parent: ClothingArmbandBase
  id: ClothingArmbandSheathKnifePolymer
  name: polymer knife sheath
  description: A rigid polymer sheath which you can strap on your leg.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: _Battlefield14/Clothing/Accessories/knifesheathpolymer.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Accessories/knifesheathpolymer.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT
  - type: ItemSlots
    slots:
      item:
        name: Knife
        whitelist:
          tags:
          - Knife

- type: entity
  parent: ClothingArmbandSheathKnifePolymer
  id: ClothingArmbandThighHolster
  name: thigh holster
  description: A drop leg holster made of a durable synthetic fiber.
  components:
  - type: Sprite
    sprite: _Battlefield14/Clothing/Accessories/thighholster.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Accessories/thighholster.rsi
  - type: ItemSlots
    slots:
      item:
        name: Handgun
        insertSound: /Audio/_Battlefield14/Weapons/Guns/misc/draw.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/misc/holster_replace.ogg
        whitelist:
          tags:
          - Sidearm

- type: entity
  parent: ClothingArmbandSheathKnifePolymer
  id: ClothingArmbandGasMaskPouch
  name: gas mask pouch
  description: A small pouch with the sole purpose of holding a gas mask at the ready in your time of need.
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,1
  - type: Sprite
    sprite: _RMC14/Clothing/Webbing/ml66a_pouch.rsi
    state: webbing
  - type: Clothing
    sprite: _RMC14/Clothing/Webbing/ml66a_pouch.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped
      rightarmband:
      - state: equipped
  - type: ItemSlots
    slots:
      item:
        name: "gas mask"
        insertSound:
          collection: BF_Magpouch_Insert
          params:
            volume: -1
            variation: 0.125
        ejectSound:
          collection: BF_Magpouch_Remove
          params:
            volume: -1
            variation: 0.125
        whitelist:
          tags:
          - GasMask

# Misc

- type: entity
  parent: ClothingArmbandBase
  id: ClothingArmbandVambrace
  name: Ballsitic vambrace
  description: A pair of level IIA kevlar vambrace to protect your forearms from shrapnel and the ocassional .22lr.
  components:
  - type: Item
    size: Large
  - type: Sprite
    sprite: _Battlefield14/Clothing/Accessories/vambrace.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Accessories/vambrace.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT
  - type: Armor
    modifiers:
      flatReductions:
        Blunt: 1
        Slash: 1
        Piercing: 1
  - type: ClothingSpeedModifier
    walkModifier: 0.97
    sprintModifier: 0.97

