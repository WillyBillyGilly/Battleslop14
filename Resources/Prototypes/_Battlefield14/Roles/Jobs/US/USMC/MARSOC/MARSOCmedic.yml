- type: job
  id: MARSOCMedic
  name: job-name-marsoc-medic
  description: job-description-marsoc-medic
  playTimeTracker: JobMARSOCMedic
  weight: 75
  startingGear: MARSOCMedicGear
  alwaysUseSpawner: true
  icon: "JobIconNATOMedic"
  requireAdminNotify: false
  supervisors: job-supervisors-usgov
  canBeAntag: false
  special:
  - !type:AddLanguageSpecial
    languagesSpoken:
    - English
    languagesUnderstood:
    - English
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - USMC
    - type: SurgerySpeedModifier
      SpeedModifier: 2.25
  - !type:AddImplantSpecial
    implants: [ TrackingImplantNATOUS ]
