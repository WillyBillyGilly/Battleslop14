- type: entity
  # COMMENTED OUT: Missing parent 'BaseMagazineRifle'
  # parent: BaseMagazineRifle
  parent: BaseMagazineRifle
  id: MagazineRifleAK74
  name: "AK-74 magazine (5.45x39mm)"
  description: Classic rock-and-lock magazine in 5.45, for 74 pattern rifles.
  components:
  - type: Tag
    tags:
      - MagazineRifleAK74
      - Magazine
  - type: BallisticAmmoProvider
    proto: BF_CartridgeRifle545x39
    mayTransfer: true
    whitelist:
      tags:
        - BF_CartridgeRifle545x39
    capacity: 30
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Ammunition/Magazines/Rifle/AK74.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance
  - type: ExtendDescription
    descriptionList:
      - description: Has an AK-74 pattern locking system.
        color: "#4f94ad"
        requireDetailRange: true

