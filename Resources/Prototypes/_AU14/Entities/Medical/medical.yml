#gauze

- type: entity
  parent: BaseItem #CMBaseHealingItem
  id: AU14HemostaticGauzePacket
  name: hemostatic gauze packet
  description: A vacuum sealed packet of chemically treated gauze designed to stop bleeding fast. The powder burns like hell, but it works. Rip it open, jam it in, hope for the best.
  components:
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: quickclot
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: qc_left
      right:
      - state: qc_right
  - type: SpawnItemsOnUse
    items:
    - id: AU14HemostaticGauzePacketTrash
    - id: AU14HemostaticGauze
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: Tag
    tags:
    - Brutepack
    - Gauze

- type: entity
  parent: BaseItem #CMBaseHealingItem
  id: AU14HemostaticGauzePacketTrash
  name: used hemostatic gauze packet
  description: A vacuum sealed packet of chemically treated gauze designed to stop arterial bleeding fast. The powder burns like hell, but it works. Single-use. This one is trash, its already been used!
  components:
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: qc_ripped
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: qc_left
      right:
      - state: qc_right

- type: entity
  parent: Gauze
  id: AU14HemostaticGauze
  name: hemostatic gauze
  description: A strip of gauze soaked with a powdery clotting agent. Once it’s out of the packet, stuff it deep into the wound and stop the bleeding before it’s too late.
  components:
  - type: Tag
    tags:
    - Brutepack
    - Gauze
  - type: Sprite
    sprite: _AU14/Items/quickclot.rsi
    state: hemgauze
  - type: Item
    sprite: _AU14/Items/quickclot.rsi
    inhandVisuals:
      left:
      - state: hemgauze_left
      right:
      - state: hemgauze_right

