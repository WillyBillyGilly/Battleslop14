- type: reagent
  id: Sarin
  name: reagent-name-sarin
  group: Toxins
  desc: reagent-desc-sarin
  physicalDesc: reagent-physical-desc-powdery
  flavor: salty
  color: "#ff8239"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
    Narcotic:
      metabolismRate: 0.2
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 4
      - !type:MovespeedModifier
        walkSpeedModifier: 0.75
        sprintSpeedModifier: 0.75
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
        probability: 0.3
      - !type:Jitter
        probability: 0.4
      - !type:Paralyze
        probability: 0.5
        paralyzeTime: 4
        conditions:
        - !type:ReagentThreshold
          min: 1.5
      - !type:PopupMessage
        type: Local
        probability: 0.05
        messages:
        - generic-reagent-effect-burning-eyes
        - generic-reagent-effect-burning-eyes-a-bit
        - generic-reagent-effect-tearing-up
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        probability: 0.02
        messages:
        - norepinephricacid-effect-eye-pain
        - norepinephricacid-effect-vision-fade
        conditions:
        - !type:ReagentThreshold
          min: 5
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        probability: 0.3
        conditions:
        - !type:ReagentThreshold
          min: 1.75
      - !type:Emote
        emote: Scream
        probability: 0.5
#      - !type:ReagentThreshold
#        min: 0.2
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: false
        damage:
          types:
            Caustic: 3
        # conditions:
        # - !type:HasComponentOnEquipmentCondition
        #   components:
        #   - type: PressureProtection
        #   invert: true

- type: reagent
  id: CSGas
  name: reagent-name-cs-gas
  group: Toxins
  desc: reagent-desc-cs-gas
  physicalDesc: reagent-physical-desc-irritating
  flavor: bitter
  color: "#ffcc99"
  boilingPoint: 310.0
  meltingPoint: 95.0
  metabolisms:
    Narcotic:
      metabolismRate: 0.15
      effects:
#      - !type:HealthChange
#        damage:
#          types:
#            Poison: 1.5
#            Heat: 0.5
      - !type:PopupMessage
        type: Local
        visualType: Large
        probability: 0.15
        messages:
        - generic-reagent-effect-burning-eyes
        - generic-reagent-effect-burning-eyes-a-bit
        - generic-reagent-effect-tearing-up
        - norepinephricacid-effect-eyes-itch
        - norepinephricacid-effect-eye-pain
      - !type:PopupMessage
        type: Local
        visualType: LargeCaution
        probability: 0.08
        messages:
        - norepinephricacid-effect-vision-fade
        - norepinephricacid-effect-vision-fail
        - norepinephricacid-effect-eye-disconnect
        conditions:
        - !type:ReagentThreshold
          min: 3
      - !type:Drunk
        boozePower: 4
        slurSpeech: false
        conditions:
        - !type:ReagentThreshold
          min: 2
      - !type:MovespeedModifier
        walkSpeedModifier: 0.6
        sprintSpeedModifier: 0.5
        conditions:
        - !type:ReagentThreshold
          min: 2
      - !type:ChemVomit
        probability: 0.25
        conditions:
        - !type:ReagentThreshold
          min: 1.5
      - !type:Jitter
        probability: 0.6
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
        probability: 0.5
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        probability: 0.4
        conditions:
        - !type:ReagentThreshold
          min: 0.5
      - !type:Emote
        emote: Cough
        showInChat: true
        probability: 0.2
      - !type:Emote
        emote: Gasp
        showInChat: true
        probability: 0.15
      - !type:Emote
        emote: Scream
        probability: 0.01
      - !type:ReagentThreshold
        min: 4
      - !type:Paralyze
        probability: 0.3
        paralyzeTime: 2
        conditions:
        - !type:ReagentThreshold
          min: 2
